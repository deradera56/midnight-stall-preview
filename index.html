<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>深夜の屋台</title><style>
:root{color-scheme:dark;--bg:#130f0d;--panel:#241f1a;--panel2:#312820;--line:#5b4a3c;--gold:#f2bd57;--red:#d85035;--green:#78bc6b;--text:#f8efe3;--muted:#c7b7a5;--bad:#ff8171}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at top left,#35241b 0,var(--bg) 52%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:manipulation}button{appearance:none;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--text);min-height:42px;font-weight:900}button:disabled{opacity:.35;filter:grayscale(1)}.primary{background:var(--red);border-color:var(--red)}.good{background:#4e8d45;border-color:#4e8d45}.app{height:100dvh;width:min(100vw,390px);margin:0 auto;padding:calc(8px + env(safe-area-inset-top)) 10px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-rows:44px 72px minmax(0,1fr) 52px 32px;gap:6px;overflow:hidden}.top,.stats,.controls,.toast{border:1px solid var(--line);background:rgba(36,31,26,.95);border-radius:8px}.top{display:grid;grid-template-columns:minmax(0,1fr) 40px 40px;gap:6px;align-items:center;padding:6px 8px}.brand{display:flex;align-items:center;gap:8px;font-size:19px;font-weight:950;min-width:0;white-space:nowrap}.brand span{overflow:hidden;text-overflow:ellipsis}.icon{font-size:22px;line-height:1}.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px;padding:5px}.stat{display:grid;grid-template-columns:18px minmax(0,1fr);gap:4px;align-items:center;background:var(--panel2);border:1px solid rgba(91,74,60,.8);border-radius:7px;padding:3px 4px;min-width:0}.stat b{color:var(--gold);font-size:14px;line-height:1;overflow:hidden;text-overflow:ellipsis}.stat span{color:var(--muted);font-size:9px;line-height:1;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.danger b{color:var(--bad)}.board{min-height:0;display:grid;grid-template-rows:repeat(5,minmax(0,1fr));gap:5px;position:relative}.guide{position:absolute;z-index:2;left:70px;right:54px;top:50%;transform:translateY(-50%);display:grid;gap:7px;padding:12px;border:1px solid rgba(242,189,87,.45);border-radius:8px;background:rgba(36,31,26,.92);box-shadow:0 12px 34px rgba(0,0,0,.28);pointer-events:none}.guide strong{color:var(--gold);font-size:14px}.guide span{font-size:12px;line-height:1.35;font-weight:800}.guide small{color:var(--muted);font-size:10px;line-height:1.35;font-weight:800}.slot{border:1px solid var(--line);border-radius:8px;background:rgba(36,31,26,.96);display:grid;grid-template-columns:38px minmax(0,1fr) 42px;align-items:center;gap:6px;padding:6px 7px;min-height:0;position:relative;user-select:none}.slot:after{content:"";position:absolute;left:26px;bottom:-7px;width:2px;height:7px;background:var(--line)}.slot:last-child:after{display:none}.slot.empty{border-style:dashed;color:var(--muted)}.slot.selected{outline:3px solid var(--gold)}.slot.synergy{border-color:var(--green);box-shadow:0 0 0 2px rgba(120,188,107,.24) inset}.dish{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:var(--gold);color:#15100d;font-size:22px}.vegetable{background:#83c96f}.noodle{background:#f0d783}.sauce{background:#e57357}.protein{background:#d99a6c}.topping{background:#8ec9bd}.side{background:#c99cf0}.soup{background:#76aee8}.tool{background:#bfb5a7}.emptyDish{background:#362b23;color:#8d7865;font-size:13px;font-weight:950}.mini{min-width:0;display:grid;gap:4px}.name{font-size:13px;font-weight:900;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tip{min-height:22px;width:fit-content;max-width:100%;border-radius:7px;padding:5px 7px;background:rgba(242,189,87,.14);color:#ead8bb;font-size:12px;line-height:1;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tip.on{background:rgba(120,188,107,.25);color:#c9f5c2}.score{justify-self:end;min-width:39px;text-align:center;background:var(--gold);color:#15100d;border-radius:999px;padding:6px 7px;font-size:17px;line-height:1;font-weight:950}.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:6px}.controls button{display:grid;grid-template-columns:22px auto;gap:4px;place-items:center;font-size:12px;line-height:1}.toast{display:flex;align-items:center;gap:7px;padding:6px 9px;color:var(--muted);font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.overlay{position:fixed;inset:0;z-index:10;display:none;place-items:center;padding:16px;background:rgba(0,0,0,.64)}.overlay.open{display:grid}.sheet{width:min(430px,100%);max-height:92dvh;overflow:auto;border:1px solid var(--line);border-radius:10px;background:#211b17;padding:14px;display:grid;gap:12px;box-shadow:0 18px 70px rgba(0,0,0,.45)}.sheet h2{margin:0;font-size:20px}.sheet p,.sheet li{margin:0;color:var(--muted);line-height:1.55}.sheet ul{margin:0;padding-left:20px;display:grid;gap:6px}.choices{display:grid;gap:8px}.choice{min-height:64px;display:grid;grid-template-columns:40px minmax(0,1fr) 34px;gap:8px;align-items:center;text-align:left}.choice strong,.choice span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.choice span{color:var(--muted);font-size:12px}.one{display:grid;grid-template-columns:1fr;gap:8px}@media(max-width:380px),(max-height:680px){.app{grid-template-rows:40px 68px minmax(0,1fr) 48px 30px;gap:5px;padding-left:8px;padding-right:8px}.brand{font-size:17px}.top{grid-template-columns:minmax(0,1fr) 38px 38px}.slot{grid-template-columns:34px minmax(0,1fr) 38px;gap:5px;padding:5px 6px}.dish{width:31px;height:31px;font-size:20px}.name{font-size:12px}.tip{font-size:11px;padding:4px 6px}.score{font-size:15px;min-width:36px}.guide{left:62px;right:50px;padding:10px}.guide span{font-size:11px}.controls button{font-size:11px}}
</style></head><body>
<main class="app"><header class="top"><div class="brand"><span class="icon">🏮</span><span>深夜の屋台</span><small id="phase">●</small></div><button id="help" aria-label="遊び方">?</button><button id="reset" aria-label="最初から">↻</button></header><section class="stats"><div class="stat"><span>🪙</span><div><b id="coins">0</b><span>所持</span></div></div><div class="stat"><span>🍜</span><div><b id="score">0</b><span>売上</span></div></div><div class="stat"><span>🏠</span><div><b id="rent">0</b><span>家賃</span></div></div><div class="stat"><span>⏱</span><div><b id="due">0</b><span>期限</span></div></div><div class="stat" id="shortBox"><span>⚠</span><div><b id="short">0</b><span>不足</span></div></div><div class="stat" id="paceBox"><span>📈</span><div><b id="pace">0</b><span>必要/T</span></div></div></section><section class="board" id="board"></section><section class="controls"><button id="draw" class="primary"><span>🥢</span><span>仕込</span></button><button id="serve" class="good"><span>🍽</span><span>提供</span></button><button id="detail"><span>🔎</span><span>詳細</span></button></section><section class="toast"><span>💬</span><span id="msg"></span></section></main>
<section class="overlay" id="helpOverlay"><div class="sheet"><h2>遊び方</h2><ul><li>仕込で5枚引き、2枚タップで入替。</li><li>緑チップは隣接シナジー。提供で売上確定。</li><li>期限が0になると家賃徴収。序盤は5Tで余裕あり。</li><li>3回提供ごとに、得と損がセットのイベント発生。</li></ul><button class="primary" data-close>OK</button></div></section>
<section class="overlay" id="detailOverlay"><div class="sheet"><h2 id="detailTitle">詳細</h2><p id="detailBody"></p><button class="primary" data-close>OK</button></div></section>
<section class="overlay" id="draftOverlay"><div class="sheet"><h2>追加</h2><div class="choices" id="draftList"></div><div class="one"><button id="skip" class="primary">選ばず +2</button></div></div></section>
<section class="overlay" id="eventOverlay"><div class="sheet"><h2>深夜イベント</h2><p>得も損もある選択。今の屋台に合う方針を選ぶ。</p><div class="choices" id="eventList"></div></div></section>
<section class="overlay" id="resultOverlay"><div class="sheet"><h2 id="resultTitle">結果</h2><p id="resultBody"></p><button id="retry" class="primary">最初から</button></div></section>
<script>
const PHASE={READY:"READY",ARRANGE:"SWAP",DRAFT:"ADD",EVENT:"EVENT",GAME_OVER:"END"};const PHASE_ICON={READY:"●",SWAP:"⇄",ADD:"+",EVENT:"!",END:"×"};
const CARDS=[{id:"tomato",icon:"🍅",name:"トマト",tag:"vegetable",base:2,weight:10,bonus:{noodle:4,sauce:2},rule:"隣が麺なら+4、たれなら+2"},{id:"noodles",icon:"🍜",name:"中華麺",tag:"noodle",base:3,weight:10,bonus:{sauce:4,protein:2,soup:5},rule:"隣がたれ+4、肉卵+2、汁+5"},{id:"miso",icon:"🧴",name:"味噌だれ",tag:"sauce",base:4,weight:9,bonus:{noodle:3,vegetable:2},rule:"隣が麺なら+3、野菜なら+2"},{id:"scallion",icon:"🟩",name:"ねぎ",tag:"vegetable",base:1,weight:9,bonus:{protein:4,sauce:2},rule:"隣が肉卵なら+4、たれなら+2"},{id:"egg",icon:"🥚",name:"半熟卵",tag:"protein",base:4,weight:6,bonus:{noodle:2,sauce:2},rule:"隣が麺またはたれなら+2"},{id:"seaweed",icon:"⬛",name:"海苔",tag:"topping",base:2,weight:6,bonus:{noodle:3,sauce:3},rule:"隣が麺またはたれなら+3"},{id:"gyoza",icon:"🥟",name:"餃子",tag:"side",base:5,weight:5,bonus:{sauce:3,vegetable:2},rule:"隣がたれなら+3、野菜なら+2"},{id:"broth",icon:"🥣",name:"濃厚スープ",tag:"soup",base:2,weight:3,bonus:{noodle:5,topping:2},rule:"隣が麺なら+5、具なら+2"},{id:"pork",icon:"🥩",name:"角煮",tag:"protein",base:7,weight:3,bonus:{sauce:5},rule:"隣がたれなら+5"},{id:"charcoal",icon:"🔥",name:"炭火台",tag:"tool",base:0,weight:2,bonus:{protein:3},global:"protein_heat",rule:"隣の肉卵+3。盤面の肉卵すべて+2"},{id:"lantern",icon:"🏮",name:"赤提灯",tag:"tool",base:1,weight:2,bonus:{side:3},global:"rent_night",rule:"家賃期限が残り1なら自身+8"}];
const BY_ID=Object.fromEntries(CARDS.map(c=>[c.id,c]));const STARTER=["tomato","tomato","noodles","noodles","miso","miso","scallion","scallion","egg","seaweed","gyoza","broth"];const TAG={vegetable:"野菜",noodle:"麺",sauce:"たれ",protein:"肉卵",topping:"具",side:"一品",soup:"汁",tool:"道具"};const HINTS=["仕込で5枚","2枚タップ入替","緑はシナジー","提供で売上","期限で家賃"];
const EVENTS=[{id:"market",icon:"🧺",title:"朝市の残り物",body:"濃厚スープを山札へ。代金-8。",can:()=>state.coins>=8,apply:()=>{state.coins-=8;state.deck.push("broth");state.msg="濃厚スープ追加 -8"}},{id:"rain",icon:"☔",title:"雨宿りの客",body:"即金+18。ただし期限-1。",can:()=>true,apply:()=>{state.coins+=18;state.due=Math.max(1,state.due-1);state.msg="雨宿り +18 / 期限-1"}},{id:"booking",icon:"📘",title:"常連の予約",body:"次の提供+10。ただし家賃+8。",can:()=>true,apply:()=>{state.nextBonus+=10;state.rent+=8;state.msg="次回売上+10 / 家賃+8"}}];
const state={coins:8,score:0,spin:0,rent:62,due:5,rentStep:1,nextBonus:0,deck:[],slots:Array(5).fill(null),selected:null,phase:PHASE.READY,draft:[],eventChoices:[],last:null,lastTouch:null,gameOver:false,msg:""};const $=id=>document.getElementById(id);const board=$("board"),draftOverlay=$("draftOverlay"),eventOverlay=$("eventOverlay"),resultOverlay=$("resultOverlay");let hold=null,held=false;
function start(){Object.assign(state,{coins:8,score:0,spin:0,rent:62,due:5,rentStep:1,nextBonus:0,deck:STARTER.slice(),slots:Array(5).fill(null),selected:null,phase:PHASE.READY,draft:[],eventChoices:[],last:null,lastTouch:null,gameOver:false,msg:"仕込み"});closeAll();render()}
function pick(pool){let total=pool.reduce((s,c)=>s+c.weight,0),roll=Math.random()*total;for(const c of pool){roll-=c.weight;if(roll<=0)return c}return pool[pool.length-1]}function draw(){if(state.gameOver||state.phase!==PHASE.READY)return;let bag=state.deck.slice();state.slots=[];for(let i=0;i<5;i++){if(!bag.length)bag=state.deck.slice();let n=Math.floor(Math.random()*bag.length);state.slots.push(BY_ID[bag.splice(n,1)[0]])}Object.assign(state,{phase:PHASE.ARRANGE,selected:null,score:0,last:null,msg:"2枚タップで入替 / 緑=発動"});render()}
function calc(){const report={total:0,rows:[]};const charcoal=state.slots.filter(c=>c&&c.global==="protein_heat").length;state.slots.forEach((card,i)=>{if(!card)return;const ns=[{side:"↑",card:state.slots[i-1]},{side:"↓",card:state.slots[i+1]}].filter(x=>x.card);let syn=0,marks=[];for(const n of ns){const gain=card.bonus[n.card.tag]||0;if(gain){syn+=gain;marks.push(`${n.side}${TAG[n.card.tag]}+${gain}`)}}let global=0,gmarks=[];if(charcoal&&card.tag==="protein"){global+=charcoal*2;gmarks.push(`炭火+${charcoal*2}`)}if(card.global==="rent_night"&&state.due===1){global+=8;gmarks.push("夜市+8")}const score=card.base+syn+global;report.total+=score;report.rows.push({i,card,base:card.base,syn,global,score,marks,gmarks})});if(state.nextBonus>0){report.total+=state.nextBonus;report.bonus=state.nextBonus}return report}
function tapSlot(i){if(state.phase!==PHASE.ARRANGE||held)return;state.lastTouch=i;if(state.selected===null){state.selected=i;state.msg="入替先"}else if(state.selected===i){state.selected=null;state.msg="解除"}else{[state.slots[state.selected],state.slots[i]]=[state.slots[i],state.slots[state.selected]];state.selected=null;state.msg="入替"}render()}function serve(){if(state.gameOver||state.phase!==PHASE.ARRANGE)return;const r=calc();state.last=r;state.score=r.total;state.coins+=r.total;state.spin++;state.nextBonus=0;state.due--;if(state.due<=0){if(state.coins>=state.rent){state.coins-=state.rent;state.rentStep++;state.rent=Math.round(state.rent*1.42+10);state.due=Math.min(5+Math.floor(state.rentStep/2),7);state.msg="家賃支払済"}else{state.gameOver=true;state.phase=PHASE.GAME_OVER;state.msg="家賃不足";render(true);openResult("閉店",`家賃 ${state.rent} に対して所持 ${state.coins}。最初からやり直せます。`);return}}else state.msg=`+${r.total}`;if(state.spin%3===0){state.phase=PHASE.EVENT;state.eventChoices=EVENTS.slice();render(true);openEvent();return}state.phase=PHASE.DRAFT;state.draft=makeDraft();render(true);openDraft()}
function makeDraft(){const out=[];while(out.length<3){const c=pick(CARDS);if(!out.some(x=>x.id===c.id))out.push(c)}return out}function goDraft(){state.phase=PHASE.DRAFT;state.draft=makeDraft();state.eventChoices=[];closeAll();render(true);openDraft()}function chooseEvent(id){if(state.phase!==PHASE.EVENT)return;const ev=EVENTS.find(e=>e.id===id);if(!ev||!ev.can())return;ev.apply();goDraft()}function choose(id){if(state.phase!==PHASE.DRAFT)return;state.deck.push(id);Object.assign(state,{phase:PHASE.READY,draft:[],slots:Array(5).fill(null),last:null,score:0,msg:"+1"});closeAll();render()}function skip(){if(state.phase!==PHASE.DRAFT)return;state.coins+=2;Object.assign(state,{phase:PHASE.READY,draft:[],slots:Array(5).fill(null),last:null,score:0,msg:"+2"});closeAll();render()}
function hint(c){const p=Object.entries(c.bonus).map(([t,g])=>`${TAG[t]||t}+${g}`);if(c.global==="protein_heat")p.push("肉卵全体+2");if(c.global==="rent_night")p.push("期限1で+8");return p.join(" ")||"長押しで詳細"}function render(keep=false){const preview=state.phase===PHASE.ARRANGE?calc():null;const active=keep?state.last:(state.last||preview);const rows=active?active.rows:[];const short=Math.max(0,state.rent-state.coins),pace=Math.ceil(short/Math.max(1,state.due));$("phase").textContent=PHASE_ICON[state.phase]||state.phase;$("coins").textContent=state.coins;$("score").textContent=preview?preview.total:state.score;$("rent").textContent=state.rent;$("due").textContent=state.due+"T";$("short").textContent=short;$("pace").textContent=pace+"/T";$("shortBox").classList.toggle("danger",short>0&&state.due<=1);$("paceBox").classList.toggle("danger",short>0&&state.due<=1);$("msg").textContent=state.msg;$("draw").disabled=state.gameOver||state.phase!==PHASE.READY;$("serve").disabled=state.gameOver||state.phase!==PHASE.ARRANGE;const guide=state.phase===PHASE.READY&&state.slots.every(x=>!x)?'<div class="guide"><strong>まず仕込</strong><span>5Tで家賃。3回提供ごとにイベント。</span><small>緑=シナジー / 提供=売上 / 期限0=家賃</small></div>':"";board.innerHTML=guide+state.slots.map((card,i)=>{const row=rows.find(x=>x.i===i);const on=row&&(row.syn>0||row.global>0);const text=row?[...row.marks,...row.gmarks].join(" / "):(card?"相性: "+hint(card):"-");return `<div class="slot ${card?"":"empty"} ${state.selected===i?"selected":""} ${on?"synergy":""}" data-slot="${i}"><div class="dish ${card?card.tag:"emptyDish"}">${card?card.icon:i+1}</div><div class="mini"><div class="name">${card?card.name:HINTS[i]}</div><div class="tip ${on?"on":""}">${text}</div></div><div class="score">${row?row.score:(card?card.base:"-")}</div></div>`}).join("")}
function showDetail(i){const card=state.slots[i];if(!card)return;const row=(state.last||calc()).rows.find(x=>x.i===i);const act=[...row.marks,...row.gmarks].join(" / ")||"発動なし";$("detailTitle").textContent=`${card.icon} ${card.name} ${row.score}`;$("detailBody").textContent=`${card.rule} / ${act}`;$("detailOverlay").classList.add("open")}function openDraft(){$("draftList").innerHTML=state.draft.map(c=>`<button class="choice" data-choice="${c.id}"><div class="dish ${c.tag}">${c.icon}</div><div><strong>${c.name}</strong><span>${c.rule}</span></div><b>${c.base}</b></button>`).join("");draftOverlay.classList.add("open")}function openEvent(){$("eventList").innerHTML=state.eventChoices.map(e=>`<button class="choice" data-event="${e.id}" ${e.can()?"":"disabled"}><div class="dish tool">${e.icon}</div><div><strong>${e.title}</strong><span>${e.body}</span></div><b>!</b></button>`).join("");eventOverlay.classList.add("open")}function openResult(t,b){$("resultTitle").textContent=t;$("resultBody").textContent=b;resultOverlay.classList.add("open")}function closeAll(){document.querySelectorAll(".overlay").forEach(x=>x.classList.remove("open"))}
board.addEventListener("pointerdown",e=>{const s=e.target.closest("[data-slot]");if(!s)return;held=false;const i=Number(s.dataset.slot);hold=setTimeout(()=>{held=true;showDetail(i)},520)});board.addEventListener("pointerup",e=>{clearTimeout(hold);const s=e.target.closest("[data-slot]");if(s&&!held)tapSlot(Number(s.dataset.slot))});board.addEventListener("pointercancel",()=>clearTimeout(hold));document.addEventListener("click",e=>{const c=e.target.closest("[data-choice]");if(c)choose(c.dataset.choice);const ev=e.target.closest("[data-event]");if(ev)chooseEvent(ev.dataset.event);if(e.target.closest("[data-close]"))closeAll()});$("draw").onclick=draw;$("serve").onclick=serve;$("reset").onclick=start;$("retry").onclick=start;$("skip").onclick=skip;$("help").onclick=()=>$("helpOverlay").classList.add("open");$("detail").onclick=()=>state.lastTouch==null?$("helpOverlay").classList.add("open"):showDetail(state.lastTouch);
start();const params=new URLSearchParams(location.search);if(params.get("drawtest")==="1"){draw();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=state.phase===PHASE.ARRANGE&&state.slots.every(Boolean)?"pass":"fail"}if(params.get("autotest")==="1"){draw();serve();document.body.dataset.testPhase=state.phase;document.body.dataset.testScore=String(state.score);document.body.dataset.testDue=String(state.due);document.body.dataset.testStatus=state.phase===PHASE.DRAFT&&state.score>0&&state.due===4?"pass":"fail"}if(params.get("flowtest")==="1"){draw();serve();skip();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=state.phase===PHASE.READY&&!draftOverlay.classList.contains("open")&&!$("draw").disabled?"pass":"fail"}if(params.get("failtest")==="1"){state.coins=0;state.rent=999;state.due=1;draw();serve();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=state.phase===PHASE.GAME_OVER&&resultOverlay.classList.contains("open")?"pass":"fail"}if(params.get("eventtest")==="1"){for(let i=0;i<2;i++){draw();serve();skip()}draw();serve();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=state.phase===PHASE.EVENT&&eventOverlay.classList.contains("open")?"pass":"fail"}
</script></body></html>
