<!doctype html>
<html lang='ja'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'>
<title>深夜の屋台</title>
<style>
:root{color-scheme:dark;--bg:#120f0d;--p:#241d18;--p2:#332820;--l:#604b39;--g:#f3bd56;--r:#d8563e;--t:#fbefe2;--m:#cbb8a1;--ok:#80c86c;--bad:#ff8476}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 10% 0,#3b2519,#120f0d 54%);color:var(--t);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}button{border:1px solid var(--l);border-radius:8px;background:var(--p2);color:var(--t);font-weight:900;min-height:42px}button:disabled{opacity:.35}.app{width:min(100vw,390px);height:100dvh;margin:0 auto;padding:calc(8px + env(safe-area-inset-top)) 9px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-rows:43px 72px minmax(0,1fr) 52px 32px;gap:6px}.top,.stats,.bar,.msg{background:rgba(36,29,24,.96);border:1px solid var(--l);border-radius:8px}.top{display:grid;grid-template-columns:minmax(0,1fr) 38px 38px 38px;gap:6px;align-items:center;padding:5px 7px}.brand{font-size:16px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand b{font-size:21px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:5px}.stat{display:grid;grid-template-columns:18px 1fr;gap:4px;align-items:center;background:var(--p2);border-radius:7px;padding:3px 4px;min-width:0}.stat b{color:var(--g);font-size:14px;overflow:hidden;text-overflow:ellipsis}.stat span:last-child{font-size:9px;color:var(--m);font-weight:800;white-space:nowrap}.bad b{color:var(--bad)}.board{min-height:0;display:grid;grid-template-rows:repeat(5,1fr);gap:5px;position:relative}.slot{display:grid;grid-template-columns:36px minmax(0,1fr) 40px;gap:6px;align-items:center;background:rgba(36,29,24,.96);border:1px solid var(--l);border-radius:8px;padding:5px 6px;min-height:0}.slot.on{border-color:var(--ok);box-shadow:0 0 0 2px rgba(128,200,108,.24) inset}.slot.sel{outline:3px solid var(--g)}.dish{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:var(--g);color:#17100c;font-size:21px}.vegetable{background:#83c96f}.noodle{background:#f0d783}.sauce{background:#e57357}.protein{background:#d99a6c}.topping{background:#8ec9bd}.side{background:#c99cf0}.soup{background:#76aee8}.tool{background:#bfb5a7}.spice{background:#ee7788}.risk{background:#74665a;color:#fff}.rare{background:#ffd05f;color:#16100b;box-shadow:0 0 0 2px rgba(255,255,255,.28) inset}.empty{background:#3a2d23;color:#9b826c;font-size:12px;font-weight:900}.name{font-size:13px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tip{margin-top:4px;min-height:22px;width:fit-content;max-width:100%;border-radius:7px;padding:5px 7px;background:rgba(243,189,86,.13);color:#ead8bb;font-size:11px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tip.on{background:rgba(128,200,108,.24);color:#cdf5c5}.score{justify-self:end;background:var(--g);color:#17100c;border-radius:999px;min-width:36px;text-align:center;padding:6px;font-size:16px;font-weight:950}.score.neg{background:#5d4038;color:#ffd8cf}.guide{position:absolute;z-index:2;left:65px;right:48px;top:50%;transform:translateY(-50%);display:grid;gap:7px;padding:11px;border:1px solid rgba(243,189,86,.55);border-radius:8px;background:rgba(36,29,24,.94);box-shadow:0 14px 36px rgba(0,0,0,.34);pointer-events:none}.guide strong{color:var(--g);font-size:14px}.guide span{font-size:12px;line-height:1.35;font-weight:850}.guide small{color:var(--m);font-size:10px;line-height:1.35;font-weight:850}.guide.fusion{border-color:#ffd05f;background:rgba(67,43,14,.96);animation:pulse .7s ease-out 2}.guide.fusion strong{color:#ffe7a6}@keyframes pulse{0%{transform:translateY(-50%) scale(.95)}70%{transform:translateY(-50%) scale(1.04)}100%{transform:translateY(-50%) scale(1)}}.bar{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:6px}.bar button{display:grid;grid-template-columns:22px auto;place-items:center;font-size:12px}.primary{background:var(--r);border-color:var(--r)}.good{background:#4d8b45;border-color:#4d8b45}.blue{background:#376d8f;border-color:#376d8f}.msg{display:flex;align-items:center;gap:7px;padding:6px 9px;color:var(--m);font-size:12px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.overlay{position:fixed;inset:0;z-index:20;display:none;place-items:center;padding:16px;background:rgba(0,0,0,.66)}.overlay.open{display:grid}.sheet{width:min(430px,100%);max-height:92dvh;overflow:auto;display:grid;gap:12px;background:#211a16;border:1px solid var(--l);border-radius:10px;padding:14px;box-shadow:0 20px 70px rgba(0,0,0,.48)}.sheet h2{margin:0;font-size:20px}.sheet p,.sheet li{margin:0;color:var(--m);line-height:1.55}.sheet ul{margin:0;padding-left:20px;display:grid;gap:6px}.rows{display:grid;gap:8px}.choice,.deckrow{min-height:58px;display:grid;grid-template-columns:40px minmax(0,1fr) 34px;gap:8px;align-items:center;text-align:left}.choice strong,.choice span,.deckrow strong,.deckrow span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.choice span,.deckrow span{color:var(--m);font-size:12px}.recipe{border:1px solid rgba(243,189,86,.38);border-radius:8px;padding:8px;background:rgba(243,189,86,.08);display:grid;gap:3px}.recipe b{color:var(--g)}@media(max-height:680px),(max-width:370px){.app{grid-template-rows:40px 68px minmax(0,1fr) 48px 30px;gap:5px}.slot{grid-template-columns:33px minmax(0,1fr) 36px}.dish{width:30px;height:30px;font-size:19px}.tip{font-size:10px}.guide{left:60px;right:44px;padding:9px}.guide span{font-size:11px}}

</head>
<body>
<main class='app'>
<header class='top'><div class='brand'><b>🏮</b> <span id='levelName'>深夜の屋台</span> <small id='phase'>●</small></div><button id='levelBtn'>層</button><button id='deckBtn'>札</button><button id='reset'>↻</button></header>
<section class='stats'><div class='stat'><span>🪙</span><div><b id='coins'>0</b><span>所持</span></div></div><div class='stat'><span>🍜</span><div><b id='score'>0</b><span>売上</span></div></div><div class='stat'><span>🏠</span><div><b id='rent'>0</b><span>家賃</span></div></div><div class='stat'><span>⏱</span><div><b id='due'>0</b><span>期限</span></div></div><div class='stat' id='shortBox'><span>⚠</span><div><b id='short'>0</b><span>不足</span></div></div><div class='stat'><span>👹</span><div><b id='boss'>0</b><span>ボス</span></div></div></section>
<section class='board' id='board'></section>
<section class='bar'><button id='draw' class='primary'><span>🥢</span><span>仕込</span></button><button id='serve' class='good'><span>🍽</span><span>提供</span></button><button id='detail'><span>🔎</span><span>詳細</span></button></section>
<section class='msg'><span>💬</span><span id='msg'></span></section>
</main>
<section class='overlay' id='levelOverlay'><div class='sheet'><h2>屋台街を選ぶ</h2><p>クリア済みの次が解放。各レベルでルールとボスが変わります。</p><div class='rows' id='levelList'></div></div></section>
<section class='overlay' id='deckOverlay'><div class='sheet'><h2>所持札</h2><p id='deckSummary'></p><div class='rows' id='deckList'></div><h2>合成レシピ</h2><div class='rows' id='recipeList'></div><button class='primary' data-close>OK</button></div></section>
<section class='overlay' id='helpOverlay'><div class='sheet'><h2>遊び方</h2><ul><li>札で所持札と合成レシピを確認。</li><li>3枚レシピが揃うと、追加時にレア札へ自動合成。</li><li>合成時は中央に合成完了と素材が出ます。</li><li>レア札は説明文にレアと表示され、ボス戦で強化。</li></ul><button class='primary' data-close>OK</button></div></section>
<section class='overlay' id='detailOverlay'><div class='sheet'><h2 id='detailTitle'>詳細</h2><p id='detailBody'></p><button class='primary' data-close>OK</button></div></section>
<section class='overlay' id='draftOverlay'><div class='sheet'><h2>追加</h2><div class='rows' id='draftList'></div><button id='skip' class='primary'>選ばず +2</button></div></section>
<section class='overlay' id='eventOverlay'><div class='sheet'><h2>深夜イベント</h2><p>得も損もある選択。デッキの方向性に合わせる。</p><div class='rows' id='eventList'></div></div></section>
<section class='overlay' id='resultOverlay'><div class='sheet'><h2 id='resultTitle'>結果</h2><p id='resultBody'></p><button id='retry' class='primary'>もう一度</button><button id='toLevels' class='blue'>レベル選択</button></div></section>
<script>
const PHASE={LEVEL:'LEVEL',READY:'READY',ARRANGE:'SWAP',DRAFT:'ADD',EVENT:'EVENT',BOSS_READY:'BOSS',BOSS_ARRANGE:'BOSS!',GAME_OVER:'END',CLEAR:'CLEAR'};
const ICON={LEVEL:'層',READY:'●',SWAP:'⇄',ADD:'+',EVENT:'!',BOSS:'👹','BOSS!':'👹',END:'×',CLEAR:'★'};
const LEVELS=[{id:0,icon:'🏮',name:'一番街',rule:'標準',coins:8,rent:62,due:5,bossAfter:2,bossName:'提灯親方',bossHp:92},{id:1,icon:'☔',name:'雨横丁',rule:'汁+2 麺単体-1',coins:7,rent:74,due:5,bossAfter:3,bossName:'雨宿りの大食い',bossHp:138},{id:2,icon:'🌑',name:'影市',rule:'完成+4 家賃高',coins:10,rent:86,due:4,bossAfter:3,bossName:'影の評論家',bossHp:178}];
const CARDS=[
{id:'tomato',icon:'🍅',name:'トマト',tag:'vegetable',base:2,w:10,b:{noodle:4,sauce:2},rule:'隣が麺+4、たれ+2'},
{id:'noodles',icon:'🍜',name:'中華麺',tag:'noodle',base:3,w:10,b:{sauce:4,protein:2,soup:5},rule:'隣がたれ+4、肉卵+2、汁+5'},
{id:'miso',icon:'🧴',name:'味噌だれ',tag:'sauce',base:4,w:9,b:{noodle:3,vegetable:2},rule:'隣が麺+3、野菜+2'},
{id:'scallion',icon:'🟩',name:'ねぎ',tag:'vegetable',base:1,w:9,b:{protein:4,sauce:2},rule:'隣が肉卵+4、たれ+2'},
{id:'egg',icon:'🥚',name:'半熟卵',tag:'protein',base:4,w:6,b:{noodle:2,sauce:2},rule:'隣が麺/たれ+2'},
{id:'seaweed',icon:'⬛',name:'海苔',tag:'topping',base:2,w:6,b:{noodle:3,sauce:3},rule:'隣が麺/たれ+3'},
{id:'gyoza',icon:'🥟',name:'餃子',tag:'side',base:5,w:5,b:{sauce:3,vegetable:2},rule:'隣がたれ+3、野菜+2'},
{id:'broth',icon:'🥣',name:'濃厚スープ',tag:'soup',base:2,w:3,b:{noodle:5,topping:2},rule:'隣が麺+5、具+2'},
{id:'pork',icon:'🥩',name:'角煮',tag:'protein',base:7,w:3,b:{sauce:5},rule:'隣がたれ+5'},
{id:'charcoal',icon:'🔥',name:'炭火台',tag:'tool',base:0,w:2,b:{protein:3},global:'heat',rule:'隣の肉卵+3。盤面の肉卵+2'},
{id:'lantern',icon:'🏮',name:'赤提灯',tag:'tool',base:1,w:2,b:{side:3},global:'night',rule:'期限1で自身+8'},
{id:'takoyaki',icon:'🐙',name:'たこ焼き',tag:'side',base:4,w:5,b:{sauce:4,topping:3},rule:'隣がたれ+4、具+3'},
{id:'yakitori',icon:'🍢',name:'焼き鳥',tag:'protein',base:6,w:4,b:{sauce:4,tool:3},rule:'隣がたれ+4、道具+3'},
{id:'oden',icon:'🍲',name:'おでん鍋',tag:'soup',base:5,w:4,b:{protein:4,topping:4},rule:'隣が肉卵/具+4'},
{id:'corn',icon:'🌽',name:'焼きとうもろこし',tag:'vegetable',base:3,w:5,b:{sauce:3,tool:3},rule:'隣がたれ/道具+3'},
{id:'beni',icon:'🌸',name:'紅しょうが',tag:'topping',base:1,w:6,b:{side:5,noodle:2},rule:'隣が一品+5、麺+2'},
{id:'ramune',icon:'🧃',name:'ラムネ',tag:'side',base:2,w:5,b:{spice:5,side:2},rule:'隣が辛味+5、一品+2'},
{id:'taiyaki',icon:'🐟',name:'たい焼き',tag:'side',base:4,w:4,b:{topping:4},rule:'隣が具+4'},
{id:'kakigori',icon:'🍧',name:'かき氷',tag:'topping',base:3,w:4,b:{side:3,spice:6},rule:'隣が一品+3、辛味+6'},
{id:'burnt',icon:'♨',name:'焦げ麺',tag:'noodle',base:-4,w:4,b:{sauce:8,soup:8},combo:['sauce','soup'],gain:10,rule:'通常-4。たれと汁で大得点'},
{id:'ferment',icon:'🧄',name:'発酵だれ',tag:'sauce',base:-3,w:4,b:{vegetable:7,protein:7},combo:['vegetable','protein'],gain:8,rule:'通常-3。野菜と肉卵で伸びる'},
{id:'cold',icon:'🧊',name:'冷めたスープ',tag:'soup',base:-4,w:3,b:{noodle:10,protein:6},combo:['noodle','protein'],gain:8,rule:'通常-4。麺と肉卵で復活'},
{id:'spice',icon:'🌶',name:'激辛粉',tag:'spice',base:-6,w:3,b:{noodle:9,soup:9},combo:['noodle','soup'],gain:12,rule:'通常-6。麺と汁で大化け'},
{id:'mystery',icon:'❓',name:'闇鍋の素',tag:'risk',base:-8,w:2,b:{},combo:['soup','protein'],gain:26,rule:'通常-8。汁と肉卵で+26'},
{id:'negi_miso',icon:'🍜',name:'ネギ味噌麺',tag:'rare',base:14,w:0,b:{vegetable:6,sauce:6,soup:8},rare:1,rule:'中華麺+ねぎ+味噌だれ。隣が汁+8'},
{id:'oden_mori',icon:'🍲',name:'特製おでん盛り',tag:'rare',base:18,w:0,b:{sauce:6,topping:6},rare:1,rule:'おでん鍋+半熟卵+角煮。隣がたれ/具+6'},
{id:'matsuri',icon:'🎆',name:'祭り皿',tag:'rare',base:20,w:0,b:{side:5,tool:5},rare:1,rule:'たこ焼き+焼き鳥+ラムネ。隣が一品/道具+5'},
{id:'stamina',icon:'🌶',name:'灼熱スタミナ麺',tag:'rare',base:16,w:0,b:{sauce:8,protein:8,soup:8},rare:1,rule:'焦げ麺+激辛粉+角煮。隣で+8'}
];
const FUSIONS=[{need:['noodles','scallion','miso'],result:'negi_miso'},{need:['oden','egg','pork'],result:'oden_mori'},{need:['takoyaki','yakitori','ramune'],result:'matsuri'},{need:['burnt','spice','pork'],result:'stamina'}];
const BY=Object.fromEntries(CARDS.map(c=>[c.id,c]));const START=['tomato','tomato','noodles','noodles','miso','miso','scallion','scallion','egg','seaweed','gyoza','broth'];const TAG={vegetable:'野菜',noodle:'麺',sauce:'たれ',protein:'肉卵',topping:'具',side:'一品',soup:'汁',tool:'道具',spice:'香辛',risk:'危険',rare:'レア'};const H=['仕込で5枚','2枚タップ入替','札で所持確認','3枚で合成','ボスを倒す'];
const state={levelId:0,coins:0,score:0,spin:0,rent:0,due:0,rentStep:1,rentPaid:0,nextBonus:0,bossHp:0,deck:[],slots:Array(5).fill(null),selected:null,phase:PHASE.LEVEL,draft:[],eventChoices:[],last:null,lastTouch:null,fusion:null,gameOver:false,msg:''};
const $=id=>document.getElementById(id),board=$('board');let hold=null,held=false;
const EVENTS=[{id:'market',icon:'🧺',title:'朝市の残り物',body:'濃厚スープを追加。代金-8。',can:()=>state.coins>=8,apply:()=>addCards(['broth'],'濃厚スープ追加 -8',-8)},{id:'rain',icon:'☔',title:'雨宿りの客',body:'即金+18。ただし期限-1。',can:()=>1,apply:()=>{state.coins+=18;state.due=Math.max(1,state.due-1);state.msg='雨宿り +18 / 期限-1'}},{id:'booking',icon:'📘',title:'常連の予約',body:'次の提供+10。ただし家賃+8。',can:()=>1,apply:()=>{state.nextBonus+=10;state.rent+=8;state.msg='次回売上+10 / 家賃+8'}},{id:'black',icon:'🌑',title:'闇仕入れ',body:'闇鍋の素と激辛粉を追加。所持+16、家賃+14。',can:()=>1,apply:()=>{state.deck.push('mystery','spice');state.coins+=16;state.rent+=14;applyFusions('spice');state.msg=state.msg||'危険札+2 / +16 / 家賃+14'}},{id:'clean',icon:'🧹',title:'棚卸し',body:'マイナス札を1枚処分。代金-6。',can:()=>state.coins>=6&&state.deck.some(id=>(BY[id]?.base||0)<0),apply:()=>{state.coins-=6;let i=state.deck.findIndex(id=>(BY[id]?.base||0)<0);if(i>=0)state.deck.splice(i,1);state.msg='マイナス札を処分 -6'}},{id:'tour',icon:'🎯',title:'屋台巡り',body:'たこ焼き・焼き鳥・ラムネを追加。代金-12。',can:()=>state.coins>=12,apply:()=>addCards(['takoyaki','yakitori','ramune'],'屋台札+3 -12',-12)}];
function cleared(){return Number(localStorage.getItem('midnightStallCleared')||'-1')}function setCleared(n){if(n>cleared())localStorage.setItem('midnightStallCleared',String(n))}function isUnlocked(id){return id<=cleared()+1||id===0}function level(){return LEVELS[state.levelId]}function desc(c){return `${c.rare?'レア / ':''}${c.rule||'長押しで詳細'}`}function counts(){return state.deck.reduce((m,id)=>(m[id]=(m[id]||0)+1,m),{})}function hasAll(ids){let c=counts();return ids.every(id=>(c[id]||0)>0)}function rem(id){let i=state.deck.indexOf(id);if(i>=0)state.deck.splice(i,1)}
function applyFusions(trigger){let made=[],lines=[];for(const f of FUSIONS){if(trigger&&!f.need.includes(trigger))continue;while(hasAll(f.need)){let line=f.need.map(id=>BY[id].name).join(' + ')+' → '+BY[f.result].name;f.need.forEach(rem);state.deck.push(f.result);made.push(BY[f.result].name);lines.push(line)}}if(made.length){state.fusion={result:'レア札 '+made.join(' / '),lines};state.msg='合成完了: '+made.join(' / ')}return made}
function addCards(ids,msg,cost=0){if(cost<0)state.coins+=cost;ids.forEach(id=>state.deck.push(id));applyFusions(ids[ids.length-1]);if(!state.msg)state.msg=msg}
function startLevel(id=state.levelId){state.levelId=id;let l=level();Object.assign(state,{coins:l.coins,score:0,spin:0,rent:l.rent,due:l.due,rentStep:1,rentPaid:0,nextBonus:0,bossHp:l.bossHp,deck:START.slice(),slots:Array(5).fill(null),selected:null,phase:PHASE.READY,draft:[],eventChoices:[],last:null,lastTouch:null,fusion:null,gameOver:false,msg:l.name+' 開店'});closeAll();render()}
function pick(pool){let total=pool.reduce((s,c)=>s+c.w,0),r=Math.random()*total;for(const c of pool){r-=c.w;if(r<=0)return c}return pool[0]}function draw(){if(state.gameOver||!(state.phase===PHASE.READY||state.phase===PHASE.BOSS_READY))return;let bag=state.deck.slice();state.slots=[];for(let i=0;i<5;i++){if(!bag.length)bag=state.deck.slice();let n=Math.floor(Math.random()*bag.length);state.slots.push(BY[bag.splice(n,1)[0]])}Object.assign(state,{phase:state.phase===PHASE.BOSS_READY?PHASE.BOSS_ARRANGE:PHASE.ARRANGE,selected:null,score:0,last:null,fusion:null,msg:'2枚タップで入替 / 緑=発動'});render()}
function calc(){let report={total:0,rows:[]},l=level(),heat=state.slots.filter(c=>c&&c.global==='heat').length;state.slots.forEach((card,i)=>{if(!card)return;let ns=[{s:'↑',c:state.slots[i-1]},{s:'↓',c:state.slots[i+1]}].filter(x=>x.c),tags=ns.map(n=>n.c.tag),base=card.base,syn=0,marks=[];if(l.id===1&&card.tag==='soup'){base+=2;marks.push('雨汁+2')}if(l.id===1&&card.tag==='noodle'&&!tags.includes('soup')){base-=1;marks.push('湿気-1')}for(const n of ns){let g=card.b[n.c.tag]||0;if(g){syn+=g;marks.push(`${n.s}${TAG[n.c.tag]}+${g}`)}}let global=0,gmarks=[];if(card.combo&&card.combo.every(t=>tags.includes(t))){let g=card.gain+(l.id===2?4:0);global+=g;gmarks.push('完成+'+g)}if(heat&&card.tag==='protein'){global+=heat*2;gmarks.push('炭火+'+heat*2)}if(card.global==='night'&&state.due===1){global+=8;gmarks.push('夜市+8')}if(card.rare&&state.phase===PHASE.BOSS_ARRANGE){global+=4;gmarks.push('レア気迫+4')}let score=base+syn+global;report.total+=score;report.rows.push({i,card,base,syn,global,score,marks,gmarks})});if(state.nextBonus>0){report.total+=state.nextBonus}if(state.phase===PHASE.BOSS_ARRANGE&&state.slots.some(c=>c&&c.tag==='risk'))report.total+=8;return report}
function tapSlot(i){if(!(state.phase===PHASE.ARRANGE||state.phase===PHASE.BOSS_ARRANGE)||held)return;state.lastTouch=i;if(state.selected===null){state.selected=i;state.msg='入替先'}else if(state.selected===i){state.selected=null;state.msg='解除'}else{[state.slots[state.selected],state.slots[i]]=[state.slots[i],state.slots[state.selected]];state.selected=null;state.msg='入替'}render()}
function serve(){if(state.gameOver||!(state.phase===PHASE.ARRANGE||state.phase===PHASE.BOSS_ARRANGE))return;let boss=state.phase===PHASE.BOSS_ARRANGE,r=calc();state.last=r;state.score=r.total;state.coins+=Math.max(0,r.total);state.spin++;state.nextBonus=0;if(boss){state.bossHp-=r.total;if(state.bossHp<=0){setCleared(state.levelId);state.phase=PHASE.CLEAR;state.msg='ボス撃破';render(true);openResult('クリア',level().bossName+'を倒した。次の屋台街が解放されました。');return}state.phase=PHASE.BOSS_READY;state.slots=Array(5).fill(null);state.msg='ボス残り '+state.bossHp;render(true);return}state.due--;if(state.due<=0){if(state.coins>=state.rent){state.coins-=state.rent;state.rentPaid++;if(state.rentPaid>=level().bossAfter){state.phase=PHASE.BOSS_READY;state.slots=Array(5).fill(null);state.msg=level().bossName+' 来店';render(true);return}state.rentStep++;state.rent=Math.round(state.rent*(level().id===2?1.5:1.42)+10);state.due=Math.min(level().due+Math.floor(state.rentStep/2),7);state.msg='家賃支払 '+state.rentPaid+'/'+level().bossAfter}else{state.gameOver=true;state.phase=PHASE.GAME_OVER;state.msg='家賃不足';render(true);openResult('閉店','家賃 '+state.rent+' に対して所持 '+state.coins+'。最初からやり直せます。');return}}else state.msg='+'+r.total;if(state.spin%3===0){state.phase=PHASE.EVENT;state.eventChoices=EVENTS.slice();render(true);openEvent();return}state.phase=PHASE.DRAFT;state.draft=makeDraft();render(true);openDraft()}
function makeDraft(){let out=[],pool=CARDS.filter(c=>c.w>0);while(out.length<3){let c=pick(pool);if(!out.some(x=>x.id===c.id))out.push(c)}return out}function choose(id){if(state.phase!==PHASE.DRAFT)return;state.deck.push(id);applyFusions(id);Object.assign(state,{phase:PHASE.READY,draft:[],slots:Array(5).fill(null),last:null,score:0,msg:state.msg||'+1'});closeAll();render()}function skip(){if(state.phase!==PHASE.DRAFT)return;state.coins+=2;Object.assign(state,{phase:PHASE.READY,draft:[],slots:Array(5).fill(null),last:null,score:0,fusion:null,msg:'+2'});closeAll();render()}
function chooseEvent(id){if(state.phase!==PHASE.EVENT)return;let ev=EVENTS.find(e=>e.id===id);if(!ev||!ev.can())return;ev.apply();state.phase=PHASE.DRAFT;state.draft=makeDraft();state.eventChoices=[];closeAll();render(true);openDraft()}
function hint(c){let p=Object.entries(c.b).map(([t,g])=>`${TAG[t]||t}+${g}`);if(c.combo)p.push('両隣完成+'+c.gain);if(c.rare){p.unshift('レア');p.push('ボス戦+4')}if(c.global==='heat')p.push('肉卵全体+2');if(c.global==='night')p.push('期限1で+8');return p.join(' ')||desc(c)}
function render(keep=false){let preview=(state.phase===PHASE.ARRANGE||state.phase===PHASE.BOSS_ARRANGE)?calc():null,active=keep?state.last:(state.last||preview),rows=active?active.rows:[],short=Math.max(0,state.rent-state.coins);$('levelName').textContent=level().icon+level().name;$('phase').textContent=ICON[state.phase]||state.phase;$('coins').textContent=state.coins;$('score').textContent=preview?preview.total:state.score;$('rent').textContent=(state.phase===PHASE.BOSS_READY||state.phase===PHASE.BOSS_ARRANGE)?'BOSS':state.rent;$('due').textContent=(state.phase===PHASE.BOSS_READY||state.phase===PHASE.BOSS_ARRANGE)?'-':state.due+'T';$('short').textContent=short;$('boss').textContent=state.bossHp>0?state.bossHp:`${state.rentPaid}/${level().bossAfter}`;$('shortBox').classList.toggle('bad',short>0&&state.due<=1);$('msg').textContent=state.msg;$('draw').disabled=state.gameOver||!(state.phase===PHASE.READY||state.phase===PHASE.BOSS_READY);$('serve').disabled=state.gameOver||!(state.phase===PHASE.ARRANGE||state.phase===PHASE.BOSS_ARRANGE);let guide=state.fusion?`<div class='guide fusion'><strong>合成完了!</strong><span>${state.fusion.result}</span><small>${state.fusion.lines.join(' / ')}</small></div>`:((state.phase===PHASE.READY||state.phase===PHASE.BOSS_READY)&&state.slots.every(x=>!x)?`<div class='guide'><strong>${state.phase===PHASE.BOSS_READY?level().bossName:'まず仕込'}</strong><span>${state.phase===PHASE.BOSS_READY?'目標 '+state.bossHp+'。レア札はボス戦+4。':'札で所持確認。3枚レシピでレア札へ合成。'}</span><small>家賃${level().bossAfter}回でボス / クリアで次解放</small></div>`:'');board.innerHTML=guide+state.slots.map((card,i)=>{let row=card?rows.find(x=>x.i===i):null,on=row&&(row.syn>0||row.global>0),score=row?row.score:(card?card.base:null),marks=row?[...row.marks,...row.gmarks].join(' / '):'',text=marks||(card?'相性: '+hint(card):'札で確認');return `<div class='slot ${on?'on':''} ${state.selected===i?'sel':''}' data-slot='${i}'><div class='dish ${card?card.tag:'empty'}'>${card?card.icon:i+1}</div><div><div class='name'>${card?(card.rare?'★ ':'')+card.name:H[i]}</div><div class='tip ${on?'on':''}'>${text}</div></div><div class='score ${score<0?'neg':''}'>${score??'-'}</div></div>`}).join('')}
function openDeck(){let c=counts(),ids=Object.keys(c).sort((a,b)=>(BY[b].rare?1:0)-(BY[a].rare?1:0)||BY[a].name.localeCompare(BY[b].name,'ja'));$('deckSummary').textContent=`全${state.deck.length}枚 / レア${ids.filter(id=>BY[id].rare).reduce((s,id)=>s+c[id],0)}枚`;$('deckList').innerHTML=ids.map(id=>{let card=BY[id];return `<div class='deckrow'><div class='dish ${card.tag}'>${card.icon}</div><div><strong>${card.rare?'★ ':''}${card.name}</strong><span>${desc(card)}</span></div><b>x${c[id]}</b></div>`}).join('')||'<p>札なし</p>';$('recipeList').innerHTML=FUSIONS.map(f=>{let ok=hasAll(f.need),r=BY[f.result];return `<div class='recipe'><b>${ok?'可':'未'} ${r.icon} レア ${r.name}</b><span>${f.need.map(id=>BY[id].name).join(' + ')}</span></div>`}).join('');$('deckOverlay').classList.add('open')}
function openDraft(){$('draftList').innerHTML=state.draft.map(c=>`<button class='choice' data-choice='${c.id}'><div class='dish ${c.tag}'>${c.icon}</div><div><strong>${c.rare?'★ ':''}${c.name}</strong><span>${desc(c)}</span></div><b>${c.base}</b></button>`).join('');$('draftOverlay').classList.add('open')}function openEvent(){$('eventList').innerHTML=state.eventChoices.map(e=>`<button class='choice' data-event='${e.id}' ${e.can()?'':'disabled'}><div class='dish tool'>${e.icon}</div><div><strong>${e.title}</strong><span>${e.body}</span></div><b>!</b></button>`).join('');$('eventOverlay').classList.add('open')}function openResult(t,b){$('resultTitle').textContent=t;$('resultBody').textContent=b;$('resultOverlay').classList.add('open')}function closeAll(){document.querySelectorAll('.overlay').forEach(x=>x.classList.remove('open'))}
function showDetail(i){let card=state.slots[i];if(!card)return;let row=(state.last||calc()).rows.find(x=>x.i===i),act=row?[...row.marks,...row.gmarks].join(' / ')||'発動なし':'未計算';$('detailTitle').textContent=`${card.icon} ${card.rare?'レア ':''}${card.name} ${row?row.score:card.base}`;$('detailBody').textContent=`${desc(card)} / ${act}`;$('detailOverlay').classList.add('open')}
board.addEventListener('pointerdown',e=>{let s=e.target.closest('[data-slot]');if(!s)return;held=false;let i=Number(s.dataset.slot);hold=setTimeout(()=>{held=true;showDetail(i)},520)});board.addEventListener('pointerup',e=>{clearTimeout(hold);let s=e.target.closest('[data-slot]');if(s&&!held)tapSlot(Number(s.dataset.slot))});board.addEventListener('pointercancel',()=>clearTimeout(hold));document.addEventListener('click',e=>{let lv=e.target.closest('[data-level]');if(lv&&isUnlocked(Number(lv.dataset.level)))startLevel(Number(lv.dataset.level));let c=e.target.closest('[data-choice]');if(c)choose(c.dataset.choice);let ev=e.target.closest('[data-event]');if(ev)chooseEvent(ev.dataset.event);if(e.target.closest('[data-close]'))closeAll()});$('draw').onclick=draw;$('serve').onclick=serve;$('reset').onclick=()=>startLevel(state.levelId);$('retry').onclick=()=>startLevel(state.levelId);$('toLevels').onclick=openLevels;$('levelBtn').onclick=()=>{state.phase=PHASE.LEVEL;renderLevels();$('levelOverlay').classList.add('open');render()};$('deckBtn').onclick=openDeck;$('skip').onclick=skip;$('detail').onclick=()=>state.lastTouch==null?$('helpOverlay').classList.add('open'):showDetail(state.lastTouch);
function renderLevels(){$('levelList').innerHTML=LEVELS.map(l=>`<button class='choice' data-level='${l.id}' ${isUnlocked(l.id)?'':'disabled'}><div class='dish tool'>${l.icon}</div><div><strong>${l.name}${cleared()>=l.id?' 済':''}</strong><span>${isUnlocked(l.id)?l.rule+' / '+l.bossName:'未解放'}</span></div><b>${l.bossAfter}</b></button>`).join('')}
startLevel(Math.min(cleared()+1,LEVELS.length-1));const params=new URLSearchParams(location.search);if(params.get('resetclear')==='1')localStorage.removeItem('midnightStallCleared');if(params.get('decktest')==='1'){openDeck();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=$('deckOverlay').classList.contains('open')&&document.body.innerText.includes('レア ネギ味噌麺')&&document.body.innerText.includes('レア /')?'pass':'fail'}if(params.get('fusiontest')==='1'){state.deck=START.slice();state.deck.push('scallion');let made=applyFusions('scallion');render();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=made.includes('ネギ味噌麺')&&state.deck.includes('negi_miso')&&document.body.innerText.includes('合成完了')&&document.body.innerText.includes('レア札')?'pass':'fail'}if(params.get('drawtest')==='1'){draw();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=(state.phase===PHASE.ARRANGE||state.phase===PHASE.BOSS_ARRANGE)&&state.slots.every(Boolean)&&![...document.querySelectorAll('.tip')].some(x=>!x.textContent.trim())?'pass':'fail'}if(params.get('autotest')==='1'){draw();serve();document.body.dataset.testPhase=state.phase;document.body.dataset.testScore=String(state.score);document.body.dataset.testDue=String(state.due);document.body.dataset.testStatus=state.phase===PHASE.DRAFT&&state.score>0&&state.due===4?'pass':'fail'}if(params.get('eventtest')==='1'){for(let i=0;i<2;i++){draw();serve();skip()}draw();serve();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=state.phase===PHASE.EVENT&&$('eventOverlay').classList.contains('open')?'pass':'fail'}if(params.get('risktest')==='1'){state.slots=[BY.broth,BY.mystery,BY.pork,null,null];state.phase=PHASE.ARRANGE;let r=calc();document.body.dataset.testPhase=state.phase;document.body.dataset.testScore=String(r.rows[1].score);document.body.dataset.testStatus=r.rows[1].score===18?'pass':'fail';render()}if(params.get('bosstest')==='1'){state.coins=999;state.rentPaid=level().bossAfter-1;state.due=1;draw();serve();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=state.phase===PHASE.BOSS_READY?'pass':'fail'}if(params.get('cleartest')==='1'){state.phase=PHASE.BOSS_ARRANGE;state.bossHp=10;state.slots=[BY.broth,BY.mystery,BY.pork,null,null];serve();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=state.phase===PHASE.CLEAR&&cleared()>=state.levelId?'pass':'fail'}if(params.get('leveltest')==='1'){localStorage.setItem('midnightStallCleared','0');state.phase=PHASE.LEVEL;renderLevels();$('levelOverlay').classList.add('open');render();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=isUnlocked(1)&&!isUnlocked(2)?'pass':'fail'}
</script>
