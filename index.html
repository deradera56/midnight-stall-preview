<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Midnight Stall Prototype</title>
  <script>
    function syncAppWidth() {
      const visualWidth = window.visualViewport ? window.visualViewport.width : window.innerWidth;
      const desktopWidth = navigator.maxTouchPoints === 0
        ? (window.outerWidth || window.innerWidth) / Math.max(1, window.devicePixelRatio || 1)
        : window.innerWidth;
      const appWidth = Math.floor(Math.min(window.innerWidth, desktopWidth, visualWidth));
      document.documentElement.style.setProperty("--app-width", appWidth + "px");
    }
    syncAppWidth();
    addEventListener("resize", syncAppWidth);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", syncAppWidth);
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #130f0d;
      --panel: #241f1a;
      --panel-2: #312820;
      --line: #5b4a3c;
      --gold: #f2bd57;
      --red: #d85035;
      --green: #78bc6b;
      --blue: #6aa8d8;
      --text: #f8efe3;
      --muted: #c7b7a5;
      --bad: #ff8171;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top left, #35241b 0, var(--bg) 48%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: manipulation;
    }
    button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      min-height: 44px;
      display: grid;
      place-items: center;
      font-weight: 900;
    }
    button.primary { background: var(--red); border-color: var(--red); }
    button.good { background: #4e8d45; border-color: #4e8d45; }
    button:disabled { opacity: .35; filter: grayscale(1); }
    svg { width: 22px; height: 22px; fill: currentColor; }
    .app {
      height: 100dvh;
      height: 100svh;
      width: min(var(--app-width, 100vw), 390px);
      max-width: none;
      margin: 0;
      padding: calc(8px + env(safe-area-inset-top)) 10px calc(8px + env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: 44px 72px minmax(0, 1fr) 52px 32px;
      gap: 6px;
      overflow: hidden;
    }
    .topbar, .stats, .controls, .toast {
      border: 1px solid var(--line);
      background: rgba(36, 31, 26, .94);
      border-radius: 8px;
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 40px 40px;
      gap: 6px;
      align-items: center;
      padding: 6px 8px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-weight: 950;
      font-size: 20px;
      white-space: nowrap;
    }
    .brand span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brand small {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
      padding: 5px;
    }
    .stat {
      background: var(--panel-2);
      border: 1px solid rgba(91, 74, 60, .8);
      border-radius: 7px;
      min-width: 0;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      align-items: center;
      gap: 3px;
      padding: 3px 4px;
      color: var(--muted);
    }
    .stat svg { width: 17px; height: 17px; }
    .meter {
      min-width: 0;
      display: grid;
      gap: 1px;
    }
    .stat b {
      color: var(--gold);
      font-size: 14px;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stat span {
      color: var(--muted);
      font-size: 9px;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 800;
    }
    .stat.danger b { color: var(--bad); }
    .board {
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(5, minmax(0, 1fr));
      gap: 5px;
      position: relative;
    }
    .board-guide {
      position: absolute;
      z-index: 2;
      left: 72px;
      right: 58px;
      top: 50%;
      transform: translateY(-50%);
      display: grid;
      gap: 7px;
      padding: 12px;
      border: 1px solid rgba(242, 189, 87, .45);
      border-radius: 8px;
      background: rgba(36, 31, 26, .9);
      box-shadow: 0 12px 34px rgba(0, 0, 0, .28);
      pointer-events: none;
    }
    .board-guide strong {
      color: var(--gold);
      font-size: 14px;
      line-height: 1;
    }
    .board-guide span {
      color: var(--text);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 800;
    }
    .board-guide small {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.35;
      font-weight: 800;
    }
    .slot {
      min-height: 0;
      border: 1px solid var(--line);
      background: rgba(36, 31, 26, .95);
      border-radius: 8px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 44px;
      align-items: center;
      gap: 6px;
      padding: 6px 7px;
      position: relative;
      user-select: none;
    }
    .slot:after {
      content: "";
      position: absolute;
      left: 27px;
      bottom: -7px;
      width: 2px;
      height: 7px;
      background: var(--line);
    }
    .slot:last-child:after { display: none; }
    .slot.empty {
      border-style: dashed;
      color: var(--muted);
    }
    .board.guide-mode .slot.empty .mini {
      opacity: .28;
    }
    .slot.selected { outline: 3px solid var(--gold); }
    .slot.synergy {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(120, 188, 107, .22) inset;
    }
    .dish {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #17110e;
      background: var(--gold);
    }
    .dish.vegetable { background: #83c96f; }
    .dish.noodle { background: #f0d783; }
    .dish.sauce { background: #e57357; }
    .dish.protein { background: #d99a6c; }
    .dish.topping { background: #8ec9bd; }
    .dish.side { background: #c99cf0; }
    .dish.soup { background: #76aee8; }
    .dish.tool { background: #bfb5a7; }
    .dish.empty-dish {
      color: #6e5948;
      background: #362b23;
      font-size: 12px;
      font-weight: 950;
    }
    .mini {
      min-width: 0;
      display: grid;
      gap: 4px;
    }
    .mini .name {
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 18px;
      align-items: center;
    }
    .pip {
      border-radius: 999px;
      background: #493d32;
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      padding: 4px 6px;
      font-weight: 800;
    }
    .pip.on {
      background: rgba(120, 188, 107, .22);
      color: #bdf0b4;
    }
    .pip.hint {
      background: rgba(242, 189, 87, .12);
      color: #e4cfa9;
    }
    .pip.wait {
      background: rgba(255, 255, 255, .06);
      color: #9f8e7c;
    }
    .score {
      justify-self: end;
      min-width: 42px;
      text-align: center;
      color: #17110e;
      background: var(--gold);
      border-radius: 999px;
      padding: 6px 8px;
      font-size: 18px;
      line-height: 1;
      font-weight: 950;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 6px;
    }
    .controls button {
      grid-template-columns: 22px auto;
      gap: 5px;
      font-size: 12px;
      line-height: 1;
    }
    .controls button span {
      font-weight: 900;
      white-space: nowrap;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 9px;
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, .64);
      z-index: 10;
    }
    .overlay.open { display: grid; }
    .sheet {
      width: min(430px, 100%);
      max-height: min(760px, 92dvh);
      overflow: auto;
      border: 1px solid var(--line);
      background: #211b17;
      border-radius: 10px;
      padding: 14px;
      display: grid;
      gap: 12px;
      box-shadow: 0 18px 70px rgba(0, 0, 0, .45);
    }
    .sheet h2 {
      margin: 0;
      font-size: 20px;
    }
    .sheet p, .sheet li {
      color: var(--muted);
      line-height: 1.55;
      margin: 0;
    }
    .sheet ul {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 6px;
    }
    .draft-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .choice {
      min-height: 64px;
      grid-template-columns: 40px minmax(0, 1fr) 34px;
      display: grid;
      gap: 8px;
      align-items: center;
      text-align: left;
    }
    .choice .text {
      display: grid;
      gap: 3px;
      min-width: 0;
    }
    .choice strong {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .choice span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .close-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    @media (max-height: 680px) {
      .app {
        grid-template-rows: 40px 68px minmax(0, 1fr) 48px 30px;
        gap: 5px;
      }
      .slot { padding: 5px 7px; }
      .dish { width: 32px; height: 32px; }
      .score { font-size: 16px; }
      .mini .name { display: none; }
    }
    @media (max-width: 380px) {
      .app {
        padding-left: 8px;
        padding-right: 8px;
        grid-template-rows: 42px 70px minmax(0, 1fr) 50px 30px;
        gap: 5px;
      }
      .brand { font-size: 17px; gap: 6px; }
      .brand small { display: none; }
      .topbar { grid-template-columns: minmax(0, 1fr) 38px 38px; }
      button { min-height: 40px; }
      .slot { grid-template-columns: 34px minmax(0, 1fr) 38px; gap: 5px; padding: 5px 6px; }
      .board-guide { left: 62px; right: 50px; padding: 10px; }
      .board-guide strong { font-size: 13px; }
      .board-guide span { font-size: 11px; }
      .dish { width: 31px; height: 31px; }
      .mini .name { font-size: 12px; }
      .pip { font-size: 10px; padding: 3px 5px; }
      .score { min-width: 36px; font-size: 15px; padding: 5px 6px; }
      .stat b { font-size: 13px; }
      .stat span { font-size: 8px; }
      .controls button { font-size: 11px; gap: 4px; }
    }
    @media (min-width: 700px) {
      .app { margin: 0 auto; }
    }
  </style>
</head>

  <main class="app">
    <header class="topbar">
      <div class="brand"><svg><use href="#i-stall"></use></svg><span>深夜の屋台</span><small id="phaseLabel">READY</small></div>
      <button id="help" aria-label="overview"><svg><use href="#i-help"></use></svg></button>
      <button id="newGame" aria-label="reset"><svg><use href="#i-reset"></use></svg></button>
    </header>

    <section class="stats" aria-label="status">
      <div class="stat"><svg><use href="#i-coin"></use></svg><div class="meter"><b id="coins">0</b><span>所持</span></div></div>

      <div class="stat"><svg><use href="#i-rent"></use></svg><div class="meter"><b id="rent">0</b><span>家賃</span></div></div>
      <div class="stat"><svg><use href="#i-clock"></use></svg><div class="meter"><b id="due">0</b><span>期限</span></div></div>
      <div class="stat" id="shortageBox"><svg><use href="#i-alert"></use></svg><div class="meter"><b id="shortage">0</b><span>不足</span></div></div>

      <button id="detail" aria-label="detail"><svg><use href="#i-help"></use></svg><span>詳細</span></button>

        <button class="primary" data-close-draft>待つ</button>
      </div>
    </div>
  </section>

  <script>
    const PHASE = { READY: "READY", ARRANGE: "SWAP", DRAFT: "ADD", GAME_OVER: "END" };
    const PHASE_ICON = { READY: "●", SWAP: "⇄", ADD: "+", END: "×" };
    const CARD_POOL = [
      { id: "tomato", icon: "i-card-tomato", name: "トマト", tag: "vegetable", base: 2, rarity: "common", weight: 10, bonus: { noodle: 4, sauce: 2 }, rule: "隣が麺なら +4、たれなら +2" },

      { id: "miso", icon: "i-card-miso", name: "味噌だれ", tag: "sauce", base: 4, rarity: "common", weight: 9, bonus: { noodle: 3, vegetable: 2 }, rule: "隣が麺なら +3、野菜なら +2" },
      { id: "scallion", icon: "i-card-scallion", name: "ねぎ", tag: "vegetable", base: 1, rarity: "common", weight: 9, bonus: { protein: 4, sauce: 2 }, rule: "隣が肉卵なら +4、たれなら +2" },
      { id: "egg", icon: "i-card-egg", name: "半熟卵", tag: "protein", base: 4, rarity: "uncommon", weight: 6, bonus: { noodle: 2, sauce: 2 }, rule: "隣が麺またはたれなら +2" },
      { id: "seaweed", icon: "i-card-seaweed", name: "海苔", tag: "topping", base: 2, rarity: "uncommon", weight: 6, bonus: { noodle: 3, sauce: 3 }, rule: "隣が麺またはたれなら +3" },
      { id: "gyoza", icon: "i-card-gyoza", name: "餃子", tag: "side", base: 5, rarity: "uncommon", weight: 5, bonus: { sauce: 3, vegetable: 2 }, rule: "隣がたれなら +3、野菜なら +2" },
      { id: "broth", icon: "i-card-broth", name: "濃厚スープ", tag: "soup", base: 2, rarity: "rare", weight: 3, bonus: { noodle: 5, topping: 2 }, rule: "隣が麺なら +5、具なら +2" },
      { id: "pork", icon: "i-card-pork", name: "角煮", tag: "protein", base: 7, rarity: "rare", weight: 3, bonus: { sauce: 5 }, rule: "隣がたれなら +5" },
      { id: "charcoal", icon: "i-card-charcoal", name: "炭火台", tag: "tool", base: 0, rarity: "rare", weight: 2, bonus: { protein: 3 }, global: "protein_heat", rule: "隣の肉卵に +3。盤面の肉卵すべてに +2" },
      { id: "lantern", icon: "i-card-lantern", name: "赤提灯", tag: "tool", base: 1, rarity: "rare", weight: 2, bonus: { side: 3 }, global: "rent_night", rule: "家賃期限が残り1ターンなら自身に +8" }
    ];
    const BY_ID = Object.fromEntries(CARD_POOL.map(card => [card.id, card]));
    const STARTER_DECK = ["tomato", "tomato", "noodles", "noodles", "miso", "miso", "scallion", "scallion", "egg", "seaweed", "gyoza", "broth"];
    const EMPTY_HINTS = ["仕込で5枚", "2枚タップ入替", "緑はシナジー", "提供で売上", "期限で家賃"];
    const TAG_LABEL = { vegetable: "野菜", noodle: "麺", sauce: "たれ", protein: "肉卵", topping: "具", side: "一品", soup: "汁", tool: "道具" };
    const state = { coins: 5, lastServedScore: 0, spin: 0, rent: 72, dueIn: 3, rentStep: 1, deck: [], slots: Array(5).fill(null), selectedSlot: null, phase: PHASE.READY, draft: [], message: "", lastReport: null, gameOver: false, lastTouched: null };
    const boardEl = document.getElementById("board");
    const messageEl = document.getElementById("message");
    const draftOverlay = document.getElementById("draftOverlay");
    let longPressTimer = null;
    let longPressFired = false;

    function startGame() {
      Object.assign(state, { coins: 5, lastServedScore: 0, spin: 0, rent: 72, dueIn: 3, rentStep: 1, deck: STARTER_DECK.slice(), slots: Array(5).fill(null), selectedSlot: null, phase: PHASE.READY, draft: [], message: "仕込み", lastReport: null, gameOver: false, lastTouched: null });
      closeAll();
      render();
    }
    function weightedChoice(pool) {
      const total = pool.reduce((sum, card) => sum + card.weight, 0);
      let roll = Math.random() * total;
      for (const card of pool) { roll -= card.weight; if (roll <= 0) return card; }
      return pool[pool.length - 1];
    }
    function drawSlots() {
      if (state.gameOver || state.phase !== PHASE.READY) return;
      const bag = state.deck.slice();
      state.slots = [];
      for (let i = 0; i < 5; i += 1) {
        if (bag.length === 0) bag.push(...state.deck);
        const index = Math.floor(Math.random() * bag.length);
        state.slots.push(BY_ID[bag.splice(index, 1)[0]]);
      }
      Object.assign(state, { phase: PHASE.ARRANGE, selectedSlot: null, lastServedScore: 0, lastReport: null, message: "2枚タップで入替 / 緑=発動" });
      render();
    }
    function calculateBoard() {
      const report = { total: 0, rows: [] };
      const charcoalCount = state.slots.filter(card => card && card.global === "protein_heat").length;
      state.slots.forEach((card, index) => {
        if (!card) return;
        const neighbors = [{ side: "↑", card: state.slots[index - 1] }, { side: "↓", card: state.slots[index + 1] }].filter(entry => entry.card);
        let synergy = 0;
        const matches = [];
        for (const entry of neighbors) {
          const gain = card.bonus[entry.card.tag] || 0;
          if (gain > 0) { synergy += gain; matches.push({ side: entry.side, name: entry.card.name, tag: entry.card.tag, gain }); }
        }
        let globalGain = 0;
        const globalMatches = [];
        if (charcoalCount > 0 && card.tag === "protein") { globalGain += charcoalCount * 2; globalMatches.push(`炭火 +${charcoalCount * 2}`); }
        if (card.global === "rent_night" && state.dueIn === 1) { globalGain += 8; globalMatches.push("夜市 +8"); }
        const score = card.base + synergy + globalGain;
        report.total += score;
        report.rows.push({ index, card, base: card.base, synergy, globalGain, score, matches, globalMatches });
      });
      return report;
    }
    function swapSlot(index) {
      if (state.phase !== PHASE.ARRANGE || longPressFired) return;
      state.lastTouched = index;
      if (state.selectedSlot === null) {
        state.selectedSlot = index;
        state.message = "入替先";
      } else if (state.selectedSlot === index) {
        state.selectedSlot = null;
        state.message = "解除";
      } else {
        const from = state.selectedSlot;
        [state.slots[from], state.slots[index]] = [state.slots[index], state.slots[from]];
        state.selectedSlot = null;
        state.message = "入替";
      }
      render();
    }
    function serve() {
      if (state.gameOver || state.phase !== PHASE.ARRANGE) return;
      const report = calculateBoard();
      state.lastReport = report;
      state.lastServedScore = report.total;
      state.coins += report.total;
      state.spin += 1;
      state.dueIn -= 1;
      if (state.dueIn <= 0) {
        if (state.coins >= state.rent) {
          state.coins -= state.rent;
          state.rentStep += 1;
          state.rent = Math.round(state.rent * 1.55 + 12);
          state.dueIn = Math.min(4 + Math.floor(state.rentStep / 2), 6);
          state.message = "支払済";
        } else {
          state.gameOver = true;
          state.phase = PHASE.GAME_OVER;
          state.message = "閉店";
          render(true);
          return;
        }
      } else {
        state.message = `+${report.total}`;
      }
      state.phase = PHASE.DRAFT;
      state.draft = makeDraft();
      render(true);
      openDraft();
    }
    function makeDraft() {
      const choices = [];
      const target = Math.min(3, new Set(CARD_POOL.map(card => card.id)).size);
      while (choices.length < target) {
        const card = weightedChoice(CARD_POOL);
        if (!choices.some(choice => choice.id === card.id)) choices.push(card);
      }
      return choices;
    }
    function chooseDraft(cardId) {
      if (state.phase !== PHASE.DRAFT || !state.draft.some(card => card.id === cardId)) return;
      state.deck.push(cardId);
      Object.assign(state, { phase: PHASE.READY, draft: [], slots: Array(5).fill(null), lastReport: null, lastServedScore: 0, message: "+1" });
      closeAll();
      render();
    }
    function skipDraft() {
      if (state.phase !== PHASE.DRAFT) return;
      state.coins += 2;
      Object.assign(state, { phase: PHASE.READY, draft: [], slots: Array(5).fill(null), lastReport: null, lastServedScore: 0, message: "+2" });
      closeAll();
      render();
    }
    function icon(id) { return `<svg><use href="#${id}"></use></svg>`; }
    function cardIcon(card) { return icon(card.icon || "i-star"); }
    function bonusHint(card) {
      const pairs = Object.entries(card.bonus).map(([tag, gain]) => `${TAG_LABEL[tag] || tag}+${gain}`);
      if (card.global === "protein_heat") pairs.push("肉卵全体+2");
      if (card.global === "rent_night") pairs.push("期限1で+8");
      return pairs.length ? pairs.join(" ") : "長押しで詳細";
    }
    function render(keepResult = false) {
      const preview = state.phase === PHASE.ARRANGE ? calculateBoard() : null;
      const active = keepResult ? state.lastReport : (state.lastReport || preview);
      const displayedScore = preview ? preview.total : state.lastServedScore;
      const shortage = Math.max(0, state.rent - state.coins);
      const pace = Math.ceil(shortage / Math.max(1, state.dueIn));
      document.getElementById("phaseLabel").textContent = PHASE_ICON[state.phase] || state.phase;
      document.getElementById("coins").textContent = state.coins;
      document.getElementById("score").textContent = displayedScore;
      document.getElementById("rent").textContent = state.rent;
      document.getElementById("due").textContent = `${state.dueIn}T`;
      document.getElementById("shortage").textContent = shortage;
      document.getElementById("pace").textContent = `${pace}/T`;
      document.getElementById("shortageBox").classList.toggle("danger", shortage > 0 && state.dueIn <= 1);
      document.getElementById("paceBox").classList.toggle("danger", shortage > 0 && state.dueIn <= 1);
      messageEl.textContent = state.message;
      document.getElementById("draw").disabled = state.gameOver || state.phase === PHASE.ARRANGE || state.phase === PHASE.DRAFT;
      document.getElementById("serve").disabled = state.gameOver || state.phase !== PHASE.ARRANGE;
      const rows = active ? active.rows : [];
      const showGuide = state.phase === PHASE.READY && state.slots.every(card => !card);
      boardEl.classList.toggle("guide-mode", showGuide);
      const guide = showGuide ? `<div class="board-guide">
        <strong>まず仕込</strong>
        <span>5枚引いて、隣同士を組み替える。</span>
        <small>緑チップ=シナジー / 提供で売上 / 期限0で家賃</small>
      </div>` : "";
      const slotsHtml = state.slots.map((card, index) => {
        const row = rows.find(entry => entry.index === index);
        const synergy = row && (row.synergy > 0 || row.globalGain > 0);
        const activePips = row ? row.matches.map(match => `<span class="pip on">${match.side}${TAG_LABEL[match.tag] || ""}+${match.gain}</span>`).join("") + row.globalMatches.map(text => `<span class="pip on">${text}</span>`).join("") : "";
        const pips = activePips || (card ? `<span class="pip hint">${bonusHint(card)}</span>` : '<span class="pip wait">-</span>');
        const emptyHint = EMPTY_HINTS[index] || "";
        return `<div class="slot ${card ? "" : "empty"} ${state.selectedSlot === index ? "selected" : ""} ${synergy ? "synergy" : ""}" data-slot="${index}">
          <div class="dish ${card ? card.tag : "empty-dish"}">${card ? cardIcon(card) : index + 1}</div>
          <div class="mini"><div class="name">${card ? card.name : emptyHint}</div><div class="pips">${pips}</div></div>
          <div class="score">${row ? row.score : card ? card.base : "-"}</div>
        </div>`;
      }).join("");
      boardEl.innerHTML = guide + slotsHtml;
    }
    function showDetail(index) {
      const card = state.slots[index];
      if (!card) return;
      const row = (state.lastReport || calculateBoard()).rows.find(entry => entry.index === index);
      const detail = row.matches.map(match => `${match.side} ${match.name} +${match.gain}`).concat(row.globalMatches).join(" / ") || "発動なし";
      document.getElementById("detailTitle").textContent = `${card.name} ${row.score}`;
      document.getElementById("detailBody").textContent = `${card.rule} / ${detail}`;
      document.getElementById("detailOverlay").classList.add("open");
    }
    function openDraft() {
      document.getElementById("draftList").innerHTML = state.draft.map(card => `<button class="choice" data-choice="${card.id}">
        <div class="dish ${card.tag}">${cardIcon(card)}</div><div class="text"><strong>${card.name}</strong><span>${card.rule}</span></div><b>${card.base}</b>
      </button>`).join("");
      draftOverlay.classList.add("open");
    }
    function closeAll() {
      document.querySelectorAll(".overlay").forEach(node => node.classList.remove("open"));
    }
    boardEl.addEventListener("pointerdown", event => {
      const slot = event.target.closest("[data-slot]");
      if (!slot) return;
      longPressFired = false;
      const index = Number(slot.dataset.slot);
      longPressTimer = setTimeout(() => { longPressFired = true; showDetail(index); }, 520);
    });
    boardEl.addEventListener("pointerup", event => {
      clearTimeout(longPressTimer);
      const slot = event.target.closest("[data-slot]");
      if (!slot) return;
      if (!longPressFired) swapSlot(Number(slot.dataset.slot));
    });
    boardEl.addEventListener("pointercancel", () => clearTimeout(longPressTimer));
    document.addEventListener("click", event => {
      const choice = event.target.closest("[data-choice]");
      if (choice) chooseDraft(choice.dataset.choice);
      if (event.target.closest("[data-close]")) closeAll();
      if (event.target.closest("[data-close-draft]")) draftOverlay.classList.remove("open");
    });
    document.getElementById("draw").addEventListener("click", drawSlots);
    document.getElementById("serve").addEventListener("click", serve);
    document.getElementById("newGame").addEventListener("click", startGame);
    document.getElementById("help").addEventListener("click", () => document.getElementById("helpOverlay").classList.add("open"));
    document.getElementById("detail").addEventListener("click", () => state.lastTouched == null ? document.getElementById("helpOverlay").classList.add("open") : showDetail(state.lastTouched));
    document.getElementById("skip").addEventListener("click", skipDraft);
    startGame();
    const params = new URLSearchParams(location.search);
    if (params.get("drawtest") === "1") {
      drawSlots();
      document.body.dataset.testPhase = state.phase;
      document.body.dataset.testStatus = state.phase === PHASE.ARRANGE && state.slots.every(Boolean) ? "pass" : "fail";
    }
    if (params.get("autotest") === "1") {
      drawSlots();
      serve();
      document.body.dataset.testPhase = state.phase;
      document.body.dataset.testScore = String(state.lastServedScore);
      document.body.dataset.testDue = String(state.dueIn);
      document.body.dataset.testStatus = state.phase === PHASE.DRAFT && state.lastServedScore > 0 && state.dueIn === 2 ? "pass" : "fail";
    }
  </script>
</body>
</html>
