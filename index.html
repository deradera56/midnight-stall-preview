<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>深夜の屋台</title><style>

background:rgba(120,188,107,.25);color:#c9f5c2}.score{justify-self:end;min-width:39px;text-align:center;background:var(--gold);color:#15100d;border-radius:999px;padding:6px 7px;font-size:17px;line-height:1;font-weight:950}.score.neg{background:#604037;color:#ffd8d0}.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:6px}.controls button{display:grid;grid-template-columns:22px auto;gap:4px;place-items:center;font-size:12px;line-height:1}.toast{display:flex;align-items:center;gap:7px;padding:6px 9px;color:var(--muted);font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.overlay{position:fixed;inset:0;z-index:10;display:none;place-items:center;padding:16px;background:rgba(0,0,0,.64)}.overlay.open{display:grid}.sheet{width:min(430px,100%);max-height:92dvh;overflow:auto;border:1px solid var(--line);border-radius:10px;background:#211b17;padding:14px;display:grid;gap:12px;box-shadow:0 18px 70px rgba(0,0,0,.45)}.sheet h2{margin:0;font-size:20px}.sheet p,.sheet li{margin:0;color:var(--muted);line-height:1.55}.sheet ul{margin:0;padding-left:20px;display:grid;gap:6px}.choices{display:grid;gap:8px}.choice{min-height:64px;display:grid;grid-template-columns:40px minmax(0,1fr) 34px;gap:8px;align-items:center;text-align:left}.choice strong,.choice span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.choice span{color:var(--muted);font-size:12px}.one{display:grid;grid-template-columns:1fr;gap:8px}@media(max-width:380px),(max-height:680px){.app{grid-template-rows:40px 68px minmax(0,1fr) 48px 30px;gap:5px;padding-left:8px;padding-right:8px}.brand{font-size:16px}.top{grid-template-columns:minmax(0,1fr) 38px 38px}.slot{grid-template-columns:34px minmax(0,1fr) 38px;gap:5px;padding:5px 6px}.dish{width:31px;height:31px;font-size:20px}.name{font-size:12px}.tip{font-size:11px;padding:4px 6px}.score{font-size:15px;min-width:36px}.guide{left:62px;right:50px;padding:10px}.guide span{font-size:11px}.controls button{font-size:11px}}
</style></head><body><main class="app"><header class="top"><div class="brand"><span class="icon">🏮</span><span id="levelName">深夜の屋台</span><small id="phase">●</small></div><button id="levelBtn" aria-label="レベル">層</button><button id="reset" aria-label="最初から">↻</button></header><section class="stats"><div class="stat"><span>🪙</span><div><b id="coins">0</b><span>所持</span></div></div><div class="stat"><span>🍜</span><div><b id="score">0</b><span>売上</span></div></div><div class="stat"><span>🏠</span><div><b id="rent">0</b><span>家賃</span></div></div><div class="stat"><span>⏱</span><div><b id="due">0</b><span>期限</span></div></div><div class="stat" id="shortBox"><span>⚠</span><div><b id="short">0</b><span>不足</span></div></div><div class="stat" id="bossBox"><span>👹</span><div><b id="boss">0</b><span>ボス</span></div></div></section><section class="board" id="board"></section><section class="controls"><button id="draw" class="primary"><span>🥢</span><span>仕込</span></button><button id="serve" class="good"><span>🍽</span><span>提供</span></button><button id="detail"><span>🔎</span><span>詳細</span></button></section><section class="toast"><span>💬</span><span id="msg"></span></section></main>
<section class="overlay" id="levelOverlay"><div class="sheet"><h2>屋台街を選ぶ</h2><p>クリア済みの次のレベルが解放されます。各レベルには固有のバフ/デバフとボスがあります。</p><div class="choices" id="levelList"></div></div></section><section class="overlay" id="helpOverlay"><div class="sheet"><h2>遊び方</h2><ul><li>家賃を規定回数支払うとボス注文が出現。</li><li>ボス営業で必要売上を超えればクリア。</li><li>マイナス札は配置完成で大化け。</li><li>レベルごとに固有ルールが変わります。</li></ul><button class="primary" data-close>OK</button></div></section><section class="overlay" id="detailOverlay"><div class="sheet"><h2 id="detailTitle">詳細</h2><p id="detailBody"></p><button class="primary" data-close>OK</button></div></section><section class="overlay" id="draftOverlay"><div class="sheet"><h2>追加</h2><div class="choices" id="draftList"></div><div class="one"><button id="skip" class="primary">選ばず +2</button></div></div></section><section class="overlay" id="eventOverlay"><div class="sheet"><h2>深夜イベント</h2><p>得も損もある選択。デッキの方向性に合わせる。</p><div class="choices" id="eventList"></div></div></section><section class="overlay" id="resultOverlay"><div class="sheet"><h2 id="resultTitle">結果</h2><p id="resultBody"></p><button id="retry" class="primary">もう一度</button><button id="toLevels" class="blue">レベル選択</button></div></section>
<script>
const PHASE={LEVEL:"LEVEL",READY:"READY",ARRANGE:"SWAP",DRAFT:"ADD",EVENT:"EVENT",BOSS_READY:"BOSS",BOSS_ARRANGE:"BOSS!",GAME_OVER:"END",CLEAR:"CLEAR"};const PHASE_ICON={LEVEL:"層",READY:"●",SWAP:"⇄",ADD:"+",EVENT:"!",BOSS:"👹","BOSS!":"👹",END:"×",CLEAR:"★"};
const LEVELS=[{id:0,icon:"🏮",name:"一番街",rule:"標準",coins:8,rent:62,due:5,bossAfter:2,bossName:"提灯親方",bossHp:92,twist:"基本ルール。まずはシナジーを覚える。"},{id:1,icon:"☔",name:"雨横丁",rule:"汁+2 麺単体-1",coins:7,rent:74,due:5,bossAfter:3,bossName:"雨宿りの大食い",bossHp:138,twist:"スープは強いが、汁なし麺は湿気る。"},{id:2,icon:"🌑",name:"影市",rule:"完成+4 家賃+高",coins:10,rent:86,due:4,bossAfter:3,bossName:"影の評論家",bossHp:178,twist:"危険札の完成ボーナスが伸びる。失敗も痛い。"}];
const CARDS=[{id:"tomato",icon:"🍅",name:"トマト",tag:"vegetable",base:2,weight:10,bonus:{noodle:4,sauce:2},rule:"隣が麺なら+4、たれなら+2"},{id:"noodles",icon:"🍜",name:"中華麺",tag:"noodle",base:3,weight:10,bonus:{sauce:4,protein:2,soup:5},rule:"隣がたれ+4、肉卵+2、汁+5"},{id:"miso",icon:"🧴",name:"味噌だれ",tag:"sauce",base:4,weight:9,bonus:{noodle:3,vegetable:2},rule:"隣が麺なら+3、野菜なら+2"},{id:"scallion",icon:"🟩",name:"ねぎ",tag:"vegetable",base:1,weight:9,bonus:{protein:4,sauce:2},rule:"隣が肉卵なら+4、たれなら+2"},{id:"egg",icon:"🥚",name:"半熟卵",tag:"protein",base:4,weight:6,bonus:{noodle:2,sauce:2},rule:"隣が麺またはたれなら+2"},{id:"seaweed",icon:"⬛",name:"海苔",tag:"topping",base:2,weight:6,bonus:{noodle:3,sauce:3},rule:"隣が麺またはたれなら+3"},{id:"gyoza",icon:"🥟",name:"餃子",tag:"side",base:5,weight:5,bonus:{sauce:3,vegetable:2},rule:"隣がたれなら+3、野菜なら+2"},{id:"broth",icon:"🥣",name:"濃厚スープ",tag:"soup",base:2,weight:3,bonus:{noodle:5,topping:2},rule:"隣が麺なら+5、具なら+2"},{id:"pork",icon:"🥩",name:"角煮",tag:"protein",base:7,weight:3,bonus:{sauce:5},rule:"隣がたれなら+5"},{id:"charcoal",icon:"🔥",name:"炭火台",tag:"tool",base:0,weight:2,bonus:{protein:3},global:"protein_heat",rule:"隣の肉卵+3。盤面の肉卵すべて+2"},{id:"lantern",icon:"🏮",name:"赤提灯",tag:"tool",base:1,weight:2,bonus:{side:3},global:"rent_night",rule:"家賃期限が残り1なら自身+8"},{id:"burnt",icon:"♨",name:"焦げ麺",tag:"noodle",base:-4,weight:4,bonus:{sauce:8,soup:8},combo:["sauce","soup"],comboGain:10,rule:"通常-4。たれと汁に挟むとさらに+10"},{id:"ferment",icon:"🧄",name:"発酵だれ",tag:"sauce",base:-3,weight:4,bonus:{vegetable:7,protein:7},combo:["vegetable","protein"],comboGain:8,rule:"通常-3。野菜と肉卵に挟むとさらに+8"},{id:"cold",icon:"🧊",name:"冷めたスープ",tag:"soup",base:-4,weight:3,bonus:{noodle:10,protein:6},combo:["noodle","protein"],comboGain:8,rule:"通常-4。麺と肉卵に挟むとさらに+8"},{id:"spice",icon:"🌶",name:"激辛粉",tag:"spice",base:-6,weight:3,bonus:{noodle:9,soup:9},combo:["noodle","soup"],comboGain:12,rule:"通常-6。麺と汁に挟むとさらに+12"},{id:"mystery",icon:"❓",name:"闇鍋の素",tag:"risk",base:-8,weight:2,bonus:{},combo:["soup","protein"],comboGain:26,rule:"通常-8。汁と肉卵に挟むと+26"}];
const BY_ID=Object.fromEntries(CARDS.map(c=>[c.id,c]));const STARTER=["tomato","tomato","noodles","noodles","miso","miso","scallion","scallion","egg","seaweed","gyoza","broth"];const TAG={vegetable:"野菜",noodle:"麺",sauce:"たれ",protein:"肉卵",topping:"具",side:"一品",soup:"汁",tool:"道具",spice:"香辛",risk:"危険"};const HINTS=["仕込で5枚","2枚タップ入替","緑はシナジー","提供で売上","ボスを倒す"];
const EVENTS=[{id:"market",icon:"🧺",title:"朝市の残り物",body:"濃厚スープを山札へ。代金-8。",can:()=>state.coins>=8,apply:()=>{state.coins-=8;state.deck.push("broth");state.msg="濃厚スープ追加 -8"}},{id:"rain",icon:"☔",title:"雨宿りの客",body:"即金+18。ただし期限-1。",can:()=>true,apply:()=>{state.coins+=18;state.due=Math.max(1,state.due-1);state.msg="雨宿り +18 / 期限-1"}},{id:"booking",icon:"📘",title:"常連の予約",body:"次の提供+10。ただし家賃+8。",can:()=>true,apply:()=>{state.nextBonus+=10;state.rent+=8;state.msg="次回売上+10 / 家賃+8"}},{id:"black",icon:"🌑",title:"闇仕入れ",body:"闇鍋の素と激辛粉を追加。所持+16、家賃+14。",can:()=>true,apply:()=>{state.deck.push("mystery","spice");state.coins+=16;state.rent+=14;state.msg="危険札+2 / +16 / 家賃+14"}},{id:"clean",icon:"🧹",title:"棚卸し",body:"山札のマイナス札を1枚処分。代金-6。",can:()=>state.coins>=6&&state.deck.some(id=>(BY_ID[id]?.base||0)<0),apply:()=>{state.coins-=6;const i=state.deck.findIndex(id=>(BY_ID[id]?.base||0)<0);if(i>=0)state.deck.splice(i,1);state.msg="マイナス札を処分 -6"}}];
const state={levelId:0,coins:0,score:0,spin:0,rent:0,due:0,rentStep:1,rentPaid:0,nextBonus:0,bossHp:0,deck:[],slots:Array(5).fill(null),selected:null,phase:PHASE.LEVEL,draft:[],eventChoices:[],last:null,lastTouch:null,gameOver:false,msg:""};const $=id=>document.getElementById(id);const board=$("board"),draftOverlay=$("draftOverlay"),eventOverlay=$("eventOverlay"),resultOverlay=$("resultOverlay"),levelOverlay=$("levelOverlay");let hold=null,held=false;
function cleared(){return Number(localStorage.getItem("midnightStallCleared")||"-1")}function setCleared(n){if(n>cleared())localStorage.setItem("midnightStallCleared",String(n))}function isUnlocked(id){return id<=cleared()+1||id===0}function level(){return LEVELS[state.levelId]}function openLevels(){state.phase=PHASE.LEVEL;renderLevels();levelOverlay.classList.add("open");render()}function renderLevels(){$("levelList").innerHTML=LEVELS.map(l=>`<button class="choice" data-level="${l.id}" ${isUnlocked(l.id)?"":"disabled"}><div class="dish tool">${l.icon}</div><div><strong>${l.name}${cleared()>=l.id?" 済":""}</strong><span>${isUnlocked(l.id)?`${l.rule} / ${l.bossName}`:"未解放"}</span></div><b>${l.bossAfter}</b></button>`).join("")}function startLevel(id=state.levelId){state.levelId=id;const l=level();Object.assign(state,{coins:l.coins,score:0,spin:0,rent:l.rent,due:l.due,rentStep:1,rentPaid:0,nextBonus:0,bossHp:l.bossHp,deck:STARTER.slice(),slots:Array(5).fill(null),selected:null,phase:PHASE.READY,draft:[],eventChoices:[],last:null,lastTouch:null,gameOver:false,msg:`${l.name} 開店`});closeAll();render()}
function pick(pool){let total=pool.reduce((s,c)=>s+c.weight,0),roll=Math.random()*total;for(const c of pool){roll-=c.weight;if(roll<=0)return c}return pool[pool.length-1]}function draw(){if(state.gameOver)return;if(state.phase!==PHASE.READY&&state.phase!==PHASE.BOSS_READY)return;let bag=state.deck.slice();state.slots=[];for(let i=0;i<5;i++){if(!bag.length)bag=state.deck.slice();let n=Math.floor(Math.random()*bag.length);state.slots.push(BY_ID[bag.splice(n,1)[0]])}Object.assign(state,{phase:state.phase===PHASE.BOSS_READY?PHASE.BOSS_ARRANGE:PHASE.ARRANGE,selected:null,score:0,last:null,msg:"2枚タップで入替 / 緑=発動"});render()}function calc(){const report={total:0,rows:[]};const l=level();const charcoal=state.slots.filter(c=>c&&c.global==="protein_heat").length;state.slots.forEach((card,i)=>{if(!card)return;const ns=[{side:"↑",card:state.slots[i-1]},{side:"↓",card:state.slots[i+1]}].filter(x=>x.card);const tags=ns.map(n=>n.card.tag);let base=card.base,syn=0,marks=[];if(l.id===1&&card.tag==="soup"){base+=2;marks.push("雨汁+2")}if(l.id===1&&card.tag==="noodle"&&!tags.includes("soup")){base-=1;marks.push("湿気-1")}for(const n of ns){const gain=card.bonus[n.card.tag]||0;if(gain){syn+=gain;marks.push(`${n.side}${TAG[n.card.tag]}+${gain}`)}}let global=0,gmarks=[];if(card.combo&&card.combo.every(t=>tags.includes(t))){global+=card.comboGain+(l.id===2?4:0);gmarks.push(`完成+${card.comboGain+(l.id===2?4:0)}`)}if(charcoal&&card.tag==="protein"){global+=charcoal*2;gmarks.push(`炭火+${charcoal*2}`)}if(card.global==="rent_night"&&state.due===1){global+=8;gmarks.push("夜市+8")}const score=base+syn+global;report.total+=score;report.rows.push({i,card,base,syn,global,score,marks,gmarks})});if(state.nextBonus>0){report.total+=state.nextBonus;report.bonus=state.nextBonus}if(state.phase===PHASE.BOSS_ARRANGE&&state.slots.some(c=>c&&c.tag==="risk")){report.total+=8;report.bossBuff=8}return report}
function tapSlot(i){if((state.phase!==PHASE.ARRANGE&&state.phase!==PHASE.BOSS_ARRANGE)||held)return;state.lastTouch=i;if(state.selected===null){state.selected=i;state.msg="入替先"}else if(state.selected===i){state.selected=null;state.msg="解除"}else{[state.slots[state.selected],state.slots[i]]=[state.slots[i],state.slots[state.selected]];state.selected=null;state.msg="入替"}render()}function serve(){if(state.gameOver||(state.phase!==PHASE.ARRANGE&&state.phase!==PHASE.BOSS_ARRANGE))return;const isBoss=state.phase===PHASE.BOSS_ARRANGE;const r=calc();state.last=r;state.score=r.total;state.coins+=Math.max(0,r.total);state.spin++;state.nextBonus=0;if(isBoss){state.bossHp-=r.total;if(state.bossHp<=0){setCleared(state.levelId);state.phase=PHASE.CLEAR;state.msg="ボス撃破";render(true);openResult("クリア",`${level().bossName}を倒した。次の屋台街が解放されました。`);return}state.msg=`ボス残り ${state.bossHp}`;state.phase=PHASE.BOSS_READY;state.slots=Array(5).fill(null);render(true);return}state.due--;if(state.due<=0){if(state.coins>=state.rent){state.coins-=state.rent;state.rentPaid++;if(state.rentPaid>=level().bossAfter){state.phase=PHASE.BOSS_READY;state.slots=Array(5).fill(null);state.msg=`${level().bossName} 来店`;render(true);return}state.rentStep++;state.rent=Math.round(state.rent*(level().id===2?1.5:1.42)+10);state.due=Math.min(level().due+Math.floor(state.rentStep/2),7);state.msg=`家賃支払 ${state.rentPaid}/${level().bossAfter}`}else{state.gameOver=true;state.phase=PHASE.GAME_OVER;state.msg="家賃不足";render(true);openResult("閉店",`家賃 ${state.rent} に対して所持 ${state.coins}。最初からやり直せます。`);return}}else state.msg=`+${r.total}`;if(state.spin%3===0){state.phase=PHASE.EVENT;state.eventChoices=EVENTS.slice();render(true);openEvent();return}state.phase=PHASE.DRAFT;state.draft=makeDraft();render(true);openDraft()}function makeDraft(){const out=[];while(out.length<3){const c=pick(CARDS);if(!out.some(x=>x.id===c.id))out.push(c)}return out}function goDraft(){state.phase=PHASE.DRAFT;state.draft=makeDraft();state.eventChoices=[];closeAll();render(true);openDraft()}function chooseEvent(id){if(state.phase!==PHASE.EVENT)return;const ev=EVENTS.find(e=>e.id===id);if(!ev||!ev.can())return;ev.apply();goDraft()}function choose(id){if(state.phase!==PHASE.DRAFT)return;state.deck.push(id);Object.assign(state,{phase:PHASE.READY,draft:[],slots:Array(5).fill(null),last:null,score:0,msg:"+1"});closeAll();render()}function skip(){if(state.phase!==PHASE.DRAFT)return;state.coins+=2;Object.assign(state,{phase:PHASE.READY,draft:[],slots:Array(5).fill(null),last:null,score:0,msg:"+2"});closeAll();render()}
function hint(c){const p=Object.entries(c.bonus).map(([t,g])=>`${TAG[t]||t}+${g}`);if(c.combo)p.push(`両隣完成+${c.comboGain}`);if(c.global==="protein_heat")p.push("肉卵全体+2");if(c.global==="rent_night")p.push("期限1で+8");return p.join(" ")||"長押しで詳細"}function render(keep=false){const preview=(state.phase===PHASE.ARRANGE||state.phase===PHASE.BOSS_ARRANGE)?calc():null;const active=keep?state.last:(state.last||preview);const rows=active?active.rows:[];const short=Math.max(0,state.rent-state.coins);$("levelName").textContent=`${level().icon}${level().name}`;$("phase").textContent=PHASE_ICON[state.phase]||state.phase;$("coins").textContent=state.coins;$("score").textContent=preview?preview.total:state.score;$("rent").textContent=state.phase===PHASE.BOSS_READY||state.phase===PHASE.BOSS_ARRANGE?"BOSS":state.rent;$("due").textContent=state.phase===PHASE.BOSS_READY||state.phase===PHASE.BOSS_ARRANGE?"-":state.due+"T";$("short").textContent=short;$("boss").textContent=state.bossHp>0?state.bossHp:`${state.rentPaid}/${level().bossAfter}`;$("shortBox").classList.toggle("danger",short>0&&state.due<=1);$("bossBox").classList.toggle("boss",state.phase===PHASE.BOSS_READY||state.phase===PHASE.BOSS_ARRANGE);$("msg").textContent=state.msg;$("draw").disabled=state.gameOver||(state.phase!==PHASE.READY&&state.phase!==PHASE.BOSS_READY);$("serve").disabled=state.gameOver&&(state.phase!==PHASE.ARRANGE&&state.phase!==PHASE.BOSS_ARRANGE);$("serve").disabled=state.gameOver||!(state.phase===PHASE.ARRANGE||state.phase===PHASE.BOSS_ARRANGE);const guide=(state.phase===PHASE.READY||state.phase===PHASE.BOSS_READY)&&state.slots.every(x=>!x)?`<div class="guide"><strong>${state.phase===PHASE.BOSS_READY?level().bossName:"まず仕込"}</strong><span>${state.phase===PHASE.BOSS_READY?`目標 ${state.bossHp}。危険札があるとボス戦+8。`:level().twist}</span><small>家賃${level().bossAfter}回でボス / クリアで次解放</small></div>`:"";board.innerHTML=guide+state.slots.map((card,i)=>{const row=rows.find(x=>x.i===i);const on=row&&(row.syn>0||row.global>0);const score=row?row.score:(card?card.base:null);const text=row?[...row.marks,...row.gmarks].join(" / "):(card?"相性: "+hint(card):"-");return `<div class="slot ${card?"":"empty"} ${state.selected===i?"selected":""} ${on?"synergy":""}" data-slot="${i}"><div class="dish ${card?card.tag:"emptyDish"}">${card?card.icon:i+1}</div><div class="mini"><div class="name">${card?card.name:HINTS[i]}</div><div class="tip ${on?"on":""}">${text}</div></div><div class="score ${score<0?"neg":""}">${score??"-"}</div></div>`}).join("")}
function showDetail(i){const card=state.slots[i];if(!card)return;const row=(state.last||calc()).rows.find(x=>x.i===i);const act=[...row.marks,...row.gmarks].join(" / ")||"発動なし";$("detailTitle").textContent=`${card.icon} ${card.name} ${row.score}`;$("detailBody").textContent=`${card.rule} / ${act}`;$("detailOverlay").classList.add("open")}function openDraft(){$("draftList").innerHTML=state.draft.map(c=>`<button class="choice" data-choice="${c.id}"><div class="dish ${c.tag}">${c.icon}</div><div><strong>${c.name}</strong><span>${c.rule}</span></div><b>${c.base}</b></button>`).join("");draftOverlay.classList.add("open")}function openEvent(){$("eventList").innerHTML=state.eventChoices.map(e=>`<button class="choice" data-event="${e.id}" ${e.can()?"":"disabled"}><div class="dish tool">${e.icon}</div><div><strong>${e.title}</strong><span>${e.body}</span></div><b>!</b></button>`).join("");eventOverlay.classList.add("open")}function openResult(t,b){$("resultTitle").textContent=t;$("resultBody").textContent=b;resultOverlay.classList.add("open")}function closeAll(){document.querySelectorAll(".overlay").forEach(x=>x.classList.remove("open"))}
board.addEventListener("pointerdown",e=>{const s=e.target.closest("[data-slot]");if(!s)return;held=false;const i=Number(s.dataset.slot);hold=setTimeout(()=>{held=true;showDetail(i)},520)});board.addEventListener("pointerup",e=>{clearTimeout(hold);const s=e.target.closest("[data-slot]");if(s&&!held)tapSlot(Number(s.dataset.slot))});board.addEventListener("pointercancel",()=>clearTimeout(hold));document.addEventListener("click",e=>{const lv=e.target.closest("[data-level]");if(lv&&isUnlocked(Number(lv.dataset.level)))startLevel(Number(lv.dataset.level));const c=e.target.closest("[data-choice]");if(c)choose(c.dataset.choice);const ev=e.target.closest("[data-event]");if(ev)chooseEvent(ev.dataset.event);if(e.target.closest("[data-close]"))closeAll()});$("draw").onclick=draw;$("serve").onclick=serve;$("reset").onclick=()=>startLevel(state.levelId);$("retry").onclick=()=>startLevel(state.levelId);$("toLevels").onclick=openLevels;$("levelBtn").onclick=openLevels;$("skip").onclick=skip;$("detail").onclick=()=>state.lastTouch==null?$("helpOverlay").classList.add("open"):showDetail(state.lastTouch);
startLevel(Math.min(cleared()+1,LEVELS.length-1));const params=new URLSearchParams(location.search);if(params.get("resetclear")==="1")localStorage.removeItem("midnightStallCleared");if(params.get("drawtest")==="1"){draw();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=(state.phase===PHASE.ARRANGE||state.phase===PHASE.BOSS_ARRANGE)&&state.slots.every(Boolean)?"pass":"fail"}if(params.get("autotest")==="1"){draw();serve();document.body.dataset.testPhase=state.phase;document.body.dataset.testScore=String(state.score);document.body.dataset.testDue=String(state.due);document.body.dataset.testStatus=state.phase===PHASE.DRAFT&&state.score>0&&state.due===4?"pass":"fail"}if(params.get("eventtest")==="1"){for(let i=0;i<2;i++){draw();serve();skip()}draw();serve();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=state.phase===PHASE.EVENT&&eventOverlay.classList.contains("open")?"pass":"fail"}if(params.get("risktest")==="1"){state.slots=[BY_ID.broth,BY_ID.mystery,BY_ID.pork,null,null];state.phase=PHASE.ARRANGE;const r=calc();document.body.dataset.testPhase=state.phase;document.body.dataset.testScore=String(r.rows[1].score);document.body.dataset.testStatus=r.rows[1].score===18?"pass":"fail";render()}if(params.get("bosstest")==="1"){state.coins=999;state.rentPaid=level().bossAfter-1;state.due=1;draw();serve();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=state.phase===PHASE.BOSS_READY?"pass":"fail"}if(params.get("cleartest")==="1"){state.phase=PHASE.BOSS_ARRANGE;state.bossHp=10;state.slots=[BY_ID.broth,BY_ID.mystery,BY_ID.pork,null,null];serve();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=state.phase===PHASE.CLEAR&&cleared()>=state.levelId?"pass":"fail"}if(params.get("leveltest")==="1"){setCleared(0);openLevels();document.body.dataset.testPhase=state.phase;document.body.dataset.testStatus=isUnlocked(1)&&!isUnlocked(2)?"pass":"fail"}
</script></body></html>
